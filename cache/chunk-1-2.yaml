response:
  Computational linguistics is not a monolithic discipline but a vibrant synthesis
  of three distinct fields: linguistics, computer science, and artificial
  intelligence. As illustrated in the Venn diagram in Fig. 1.2, it resides at the
  intersection where the scientific study of language, the theory of computation,
  and the quest for intelligent behavior converge. Each parent field provides
  indispensable components, and understanding their unique contributions is key to
  grasping the nature of our subject.
  
  From *linguistics*, the field inherits its core object of study and theoretical
  grounding. Linguistics provides the formal models for describing language
  structure, from the smallest sounds (phonology) and word forms (morphology) to
  sentence structure (syntax) and meaning (semantics and pragmatics). It frames
  the fundamental questions: What constitutes a grammatical sentence? How do words
  acquire meaning from context? How do we resolve ambiguity? Without the
  descriptive and theoretical frameworks developed over centuries of linguistic
  study, our computational efforts would be unguided, lacking a deep understanding
  of the phenomena we seek to model.
  
  *Computer science* provides the "computational" in the field's name,
  contributing the algorithms, data structures, and engineering principles
  necessary to make linguistic theories operational. It is the discipline that
  allows us to process language at a massive scale. Formal language theory, which
  we will encounter in Chapter 2, provides the mathematical foundation for
  modeling language structures, while efficient algorithms for tasks like parsing
  and searching enable the creation of practical applications. Computer science
  provides the rigor and scalability to transform abstract linguistic models into
  working systems that can handle the complexity and sheer volume of real-world
  text and speech.
  
  Finally, *artificial intelligence* (AI) provides the overarching ambition and
  many of the most powerful modern techniques. The goal of building machines that
  can understand and generate language is a quintessential AI problem, often seen
  as a hallmark of true intelligence. Historically, computational linguistics has
  been considered a core subfield of AI. In the contemporary era, this link is
  stronger than ever, as AI's machine learning paradigm—and deep learning in
  particular—has become the dominant approach for nearly every language task. This
  synergy is what propels the field forward: linguistic insight informs the
  architecture of AI models, which are then implemented and evaluated using the
  powerful tools of computer science.
