response:
  How can a system efficiently find documents containing a query term from a
  collection of millions or even billions of texts? A brute-force approach, which
  involves scanning every document for the term at query time, is computationally
  infeasible. The solution to this problem is a data structure at the heart of
  nearly all modern search engines: the **inverted index**. The core idea is
  simple and elegant, analogous to the index at the back of a physical book.
  Instead of mapping from a document to the terms it contains, an inverted index
  maps from a term to the documents that contain it.
  
  An inverted index consists of two main components:
  
  - **Dictionary (or Vocabulary):** This is a list of all unique terms that appear
    in the entire document collection. For fast lookups, the dictionary is
    typically sorted or stored in a complex data structure like a B-tree.
  - **Postings Lists:** For every term in the dictionary, there is an associated
    list of pointers to the documents that contain that term. Each entry in this
    list, called a *posting*, is typically a document identifier (DocID).
  
  When a single-word query, such as "computational", arrives, the system performs
  a fast lookup in the dictionary to find the term. It then retrieves the
  corresponding postings list, which immediately provides the set of all relevant
  documents.
  
  The real power of the inverted index becomes apparent with multi-word queries,
  such as `"computational" AND "linguistics"`. The system retrieves the postings
  list for "computational" and the postings list for "linguistics". It then
  computes the *intersection* of these two lists—the set of DocIDs that appear in
  both. This operation is vastly more efficient than scanning every document for
  both terms. The inverted index trades a slower, one-time indexing process for
  extremely fast query resolution, making it the foundational component for modern
  Information Retrieval.
