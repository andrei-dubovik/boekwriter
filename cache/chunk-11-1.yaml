response:
  This chapter introduces *sentiment analysis*, the computational task of
  identifying and extracting opinions, sentiments, and emotions from text
  data.[^1] While previous chapters often focused on the objective, factual
  content of language, our focus now shifts to its *subjective* dimension. The
  core goal is to automatically determine the author's attitude, evaluation, or
  emotional state concerning a particular topic or entity.
  
  The most common task in sentiment analysis is determining a text's *polarity*:
  is the expressed opinion positive, negative, or neutral? This seemingly simple
  classification powers countless applications. As we will see, the immense volume
  of user-generated content on the web—from product reviews and social media posts
  to political commentary—has made sentiment analysis an indispensable tool for
  understanding public opinion at scale.
  
  [^1]: The terms *sentiment analysis* and *opinion mining* are often used
  interchangeably, and we will follow that convention in this chapter.
