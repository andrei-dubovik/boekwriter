response:
  Building a corpus is a more deliberate and structured process than simply
  downloading a large amount of text. The goal is to create a resource that is
  balanced, representative, and suitable for the research questions it is intended
  to answer. This construction process generally follows a series of essential
  steps, as illustrated in the workflow in **Fig. 3.5**.
  
  The first stage is *data acquisition*. The source of the text depends entirely
  on the corpus's purpose. For a corpus of contemporary news, one might use web
  scraping to gather articles from various online newspapers. For a historical
  corpus, the process might involve digitizing physical books and manuscripts
  using Optical Character Recognition (OCR). Other sources include parliamentary
  records, social media feeds, or transcribed speech. A crucial part of
  acquisition is *sampling*. Rather than collecting all available data, which may
  be impractical or introduce bias, we select a representative sample. For a
  balanced corpus like the Brown Corpus, this meant carefully selecting texts from
  15 different genres to ensure the sample reflected the broad range of published
  American English at the time.
  
  Once the raw data is collected, it must undergo extensive *data cleaning*. Text
  from the web is often riddled with non-linguistic noise, such as HTML tags,
  advertisements, navigation menus, and JavaScript code, all of which must be
  stripped away. Scanned documents may contain OCR errors that need correction.
  This stage is often labor-intensive but is critical for the quality of the final
  corpus; the principle of "garbage in, garbage out" applies with full force.
  
  After cleaning, the text is structured and formatted, often using standards like
  XML (eXtensible Markup Language) or JSON (JavaScript Object Notation). This
  provides a consistent format and, more importantly, allows for the inclusion of
  *metadata*—literally, "data about the data." Metadata provides essential
  contextual information for each document. For a newspaper article, metadata
  might include:
  
  - The publication source (e.g., *The New York Times*)
  - The publication date
  - The author's name
  - The article's section (e.g., "Business," "Sports")
  
  This structured information is invaluable. It allows researchers to not only
  analyze the language itself but also to investigate how language use varies
  across different sources, time periods, or genres. By following these steps, a
  simple collection of raw text is transformed into a powerful and scientifically
  valuable linguistic corpus.
