response:
  While the concept of annotation can be applied simply, such as labeling
  documents for sentiment, some corpora feature incredibly rich, multi-layered
  annotation schemas. Perhaps the most influential example of such a resource in
  the history of computational linguistics is the **Penn Treebank (PTB)**.
  Developed at the University of Pennsylvania, the PTB project annotated a large
  corpus, primarily consisting of over a million words from *Wall Street Journal*
  articles, with detailed linguistic information. Its release provided a large,
  consistent, and publicly available dataset that became the standard benchmark
  for developing and evaluating a generation of NLP models, particularly syntactic
  parsers.
  
  The annotation in the Penn Treebank is applied in layers. The first and most
  fundamental layer is **Part-of-Speech (POS) tagging**. Every single word in the
  corpus is assigned a grammatical tag based on a detailed tagset. The PTB tagset
  uses 36 distinct POS tags and 12 other tags for punctuation and currency
  symbols. This level of granularity is crucial for computational analysis; for
  instance, the tagset distinguishes between a singular noun (`NN`), a plural noun
  (`NNS`), a proper noun (`NNP`), a base form verb (`VB`), a verb in the past
  tense (`VBD`), and a verb in the present participle form (`VBG`). This
  fine-grained information is far more useful for a computational model than
  simply labeling all of these as "noun" or "verb".
  
  The second and most famous layer of annotation is the **syntactic treebank**,
  from which the project gets its name. On top of the POS tags, the sentences were
  parsed into their constituent structures, creating a "tree" that represents the
  sentence's grammatical organization. This type of annotation is known as a
  *constituency parse* or *phrase-structure parse*. It hierarchically groups words
  into phrases, which are in turn grouped into larger phrases, until the entire
  sentence is accounted for. Common phrasal labels include NP (Noun Phrase), VP
  (Verb Phrase), PP (Prepositional Phrase), and ADJP (Adjective Phrase), with S
  representing the entire sentence clause.
  
  A visual representation of this structure for the sentence 'The old man sat on
  the chair' is shown in **Fig. 3.7**. At the lowest level of the tree, each word
  is connected to its POS tag (e.g., 'man' is a `NN`, 'sat' is a `VBD`). These
  tagged words form the *terminal nodes*. Above them, the tree groups words into
  phrasal constituents. 'The', 'old', and 'man' are grouped into a Noun Phrase
  (`NP`). Similarly, 'on the chair' forms a Prepositional Phrase (`PP`). These
  phrases are then nested within larger ones; the `PP` is part of the Verb Phrase
  (`VP`), 'sat on the chair'. Finally, the initial `NP` and the `VP` combine to
  form the complete sentence, labeled with the root symbol `S`. In the corpus
  files, this hierarchical structure is typically stored using a bracketed
  notation, like this:
  
  `(S (NP (DT The) (JJ old) (NN man)) (VP (VBD sat) (PP (IN on) (NP (DT the) (NN chair)))) (. .))`
  
  The influence of the Penn Treebank extends beyond these two layers. The same
  underlying text has since been enriched with further layers of annotation in
  subsequent projects. For example, **PropBank** added a layer of semantic role
  labels, identifying *who* did *what* to *whom*. Later, projects like
  **OntoNotes** added annotations for coreference (linking pronouns like 'he' and
  'it' to the entities they refer to), word senses, and named entities. This
  demonstrates how a well-designed base corpus can serve as a scaffold for
  building even richer linguistic resources over time. The legacy of the Penn
  Treebank is a testament to the power of high-quality, deeply annotated data in
  driving scientific progress and enabling the development of sophisticated
  language understanding technologies.
