response:
  After acquiring a raw text, the first and most fundamental step in preparing it
  for analysis is *tokenization*. This is the process of segmenting a continuous
  stream of characters into a sequence of discrete, meaningful units called
  *tokens*. For English and many other languages, these tokens often correspond to
  words, numbers, and punctuation marks. To a computer, a text file is simply a
  long sequence of bytes; it has no inherent understanding of where one word ends
  and another begins. Tokenization imposes the first layer of linguistic structure
  onto this raw data, transforming it from an undifferentiated string into a list
  of items that our algorithms can count, compare, and analyze.
  
  Consider the simple sentence: `The quick brown fox jumps.` A standard tokenizer
  would break this string into the following list of six tokens:
  
  `['The', 'quick', 'brown', 'fox', 'jumps', '.']`
  
  Notice that the final period is treated as a separate token. This is a common
  and important choice, as it separates the word "jumps" from the
  sentence-boundary marker. By isolating punctuation, we can analyze it as a
  distinct feature or choose to ignore it later, but the decision is preserved.
  Without tokenization, we would be left to work with individual characters or
  complex string-matching rules, making even simple tasks like counting word
  occurrences unnecessarily difficult. The sequence of tokens becomes the primary
  input for most subsequent NLP tasks, from part-of-speech tagging to parsing and
  language modeling.
  
  This process also allows us to introduce two foundational concepts in corpus
  linguistics: *tokens* and *types*. A **token** is an instance of a word or
  symbol in the text. In the sentence, "The cat sat on the mat.", there are seven
  tokens in total. A **type**, on the other hand, is a unique word or symbol in
  the vocabulary. The set of types for that sentence would be
  `{The, cat, sat, on, the, mat, .}`. If we are being case-sensitive, this set
  contains seven unique types. If we ignore case, then 'The' and 'the' would be
  instances of the same type, reducing our type count to six. The collection of
  all unique types in a corpus is known as its **vocabulary**, often denoted as
  *V*. The distinction is crucial: the total number of tokens tells us the length
  of the corpus, while the number of types tells us the size of its vocabulary.
  
  At first glance, tokenization might seem as simple as splitting a string by its
  whitespace characters. This naive approach, however, quickly breaks down when
  faced with the messiness of real-world text. Language is filled with ambiguities
  that challenge simple rules. For instance, how should we handle a date like
  `03/25/2024`? Is it one token or five (`03`, `/`, `25`, `/`, `2024`)? What about
  a monetary value like `$45.50`? Or a single contraction like "don't", which
  could be treated as one token (`don't`) or two (`do`, `n't`) to separate the
  verb from the negation. As we will see next, successfully navigating these edge
  cases is crucial for building a reliable NLP pipeline.
