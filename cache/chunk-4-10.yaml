response:
  While Laplace smoothing offers a simple fix for the zero-probability problem, it
  is a blunt instrument. It reallocates probability mass equally among all unseen
  n-grams, regardless of how likely they might be, and it does so by taking too
  much probability away from high-frequency counts. A more sophisticated and
  empirically grounded approach is **Good-Turing smoothing**, named after its
  creators Alan Turing and I.J. Good.
  
  The core intuition behind Good-Turing is both clever and powerful: to estimate
  the probability of things you *haven't* seen, you should look at the frequency
  of things you've only seen *once*. Why? An n-gram that has occurred just once (a
  singleton) is on the verge of novelty. It was, until recently, an unseen event.
  The population of these singletons, therefore, provides our best evidence for
  the rate at which new, previously unseen events will appear in the future.
  
  To formalize this, we first need to count the *frequency of frequencies*. Let
  $N_c$ be the number of n-gram *types* that occur exactly $c$ times in the
  corpus. For example, $N_1$ is the count of all singleton n-grams (those that
  appeared only once), $N_2$ is the count of all n-gram types that appeared twice,
  and so on. When we plot these values for a large corpus, we typically see a
  long-tailed distribution, as shown in Fig. 4.10. The number of singletons
  ($N_1$) is very large, followed by a smaller $N_2$, an even smaller $N_3$, and
  so on.
  
  !\[Fig. 4.10\](description: A bar chart titled 'Frequency of Frequencies'. The
  x-axis represents a frequency 'r' (n-grams that appeared 1 time, 2 times, etc.),
  and the y-axis represents the number of n-gram types (Nr) that had that
  frequency. This visualizes the long-tail distribution that Good-Turing smoothing
  leverages to estimate the probability of unseen events.)
  
  Good-Turing uses this distribution to estimate the total probability mass that
  should be reserved for all zero-count n-grams combined. The estimate is
  remarkably simple:
  
  $P_{\text{unseen}} = \frac{N_1}{N}$
  
  Here, $N$ is the total number of n-gram tokens in the corpus. We are effectively
  reassigning the probability mass of the singleton bucket to the zero-count
  bucket. The logic is that the $N_1$ singletons we observed are a good proxy for
  the number of new n-grams we would expect to find if we doubled the size of our
  corpus.
  
  Of course, if we allocate this probability to unseen events, we must reduce the
  probability of the events we have seen to ensure all probabilities still sum to
  1\. Good-Turing does this by adjusting the count $c$ for any n-gram that appeared
  $c > 0$ times. This adjusted count, denoted $c^*$, is used in place of the
  original MLE count. The formula is:
  
  $c^* = (c+1) \frac{N_{c+1}}{N_c}$
  
  The new probability for an n-gram that was seen $c$ times is then
  $P_{GT} = \frac{c^*}{N}$. The formula for $c^*$ may seem complex, but its effect
  is intuitive. Since for most corpora $N_{c+1} < N_c$ (there are fewer bigrams
  that appear 10 times than 9 times), the ratio $\frac{N_{c+1}}{N_c}$ will be less
  than 1. This means the adjusted count $c^*$ will almost always be slightly less
  than the original count $c$ ($c^* < c$), effectively discounting it. The amount
  of the discount is not arbitrary, as in Laplace smoothing, but is determined by
  the actual distribution of word counts in the corpus.
  
  A significant practical problem arises with this formula: what if we encounter
  an $N_c$ for which there is no observed $N_{c+1}$? For example, we might have
  n-grams that occurred 9 times ($N_9 > 0$) but none that occurred 10 times
  ($N_{10} = 0$). This would make $c^*$ for n-grams with a count of 9 equal to
  zero, which is clearly not right. To solve this and other issues related to
  sparse frequency-of-frequency counts, a variation called **Simple Good-Turing**
  is typically used in practice. It involves fitting a smooth curve to the plot of
  $N_c$ vs. $c$, providing a reliable estimate for $N_c$ even when the observed
  value is zero.
  
  In summary, Good-Turing smoothing provides a far more principled method for
  handling unseen events than Laplace smoothing. By leveraging the distribution of
  the corpus itself—specifically using the count of singletons as an estimate for
  the unknown—it creates a more accurate and reliable language model.
