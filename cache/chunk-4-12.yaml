  A clean illustration of a smartphone's virtual keyboard. A partial sentence is
  typed in the text field (e.g., 'I am heading to the...'), and the predictive
  text bar above the keyboard shows three probable next words (e.g., 'park',
  'store', 'gym') that an N-gram model would suggest.
  
  This visual aid will be drafted separately, but you can already refer to it as
