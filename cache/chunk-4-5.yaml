response:
  Once we have defined the N-gram model, the central task becomes learning its
  parameters from data. The parameters of an N-gram model are the conditional
  probabilities themselves, such as $P(w_i | w_{i-1})$ for a bigram model. The
  standard method for estimating these probabilities from a text corpus is called
  **Maximum Likelihood Estimation**, or **MLE**. The intuition behind MLE is
  simple yet powerful: the best estimate for a parameter is the one that maximizes
  the probability of the training corpus we observed. In the context of N-grams,
  this principle simplifies to a very direct calculation: the relative frequency.
  We assume that the probability of a future event is best represented by its
  frequency in the past, as recorded in our corpus.
  
  The general formula for the Maximum Likelihood Estimate of an N-gram probability
  is a ratio of counts. The probability of a word $w_i$ given its preceding
  history of $n-1$ words is the count of the full N-gram sequence divided by the
  count of the prefix (the history).
  
  Let $C(w_1, \dots, w_k)$ be the function that counts the number of times the
  sequence of words $(w_1, \dots, w_k)$ appears in the corpus. The MLE probability
  is then:
  
  $P_{MLE}(w_i | w_{i-n+1}, \dots, w_{i-1}) = \frac{C(w_{i-n+1}, \dots, w_{i-1}, w_i)}{C(w_{i-n+1}, \dots, w_{i-1})}$
  
  This single equation is the foundation for training simple N-gram models. Let's
  see how it applies to our specific cases:
  
  - **Trigram Model:** For a trigram model ($n=3$), we estimate the probability of
    a word $w_i$ given the two preceding words, $w_{i-2}$ and $w_{i-1}$. The MLE
    is the count of the trigram $C(w_{i-2}, w_{i-1}, w_i)$ divided by the count of
    the bigram prefix $C(w_{i-2}, w_{i-1})$.
    $P(w_i | w_{i-2}, w_{i-1}) = \frac{C(w_{i-2}, w_{i-1}, w_i)}{C(w_{i-2}, w_{i-1})}$
  
  - **Bigram Model:** For a bigram model ($n=2$), we estimate the probability of
    $w_i$ given the single preceding word $w_{i-1}$. This is calculated as the
    count of the word pair $C(w_{i-1}, w_i)$ divided by the count of the
    single-word prefix $C(w_{i-1})$.
    $P(w_i | w_{i-1}) = \frac{C(w_{i-1}, w_i)}{C(w_{i-1})}$
  
  - **Unigram Model:** The unigram model ($n=1$) is the simplest case. It does not
    depend on any prior context, so the probability of a word $w_i$ is just its
    relative frequency in the entire corpus. Here, the denominator is the total
    number of word tokens in the corpus, which we can denote as $N$.
    $P(w_i) = \frac{C(w_i)}{N}$
  
  This process of "training" an N-gram model, then, is not a complex optimization
  procedure but rather a straightforward task of data collection. It involves
  scanning a large corpus and counting all occurrences of relevant N-grams. For
  instance, to build a bigram model, we would need two main data structures: one
  to store the counts of all individual words (for the denominators) and another
  to store the counts of all adjacent word pairs (for the numerators). Once these
  counts are tabulated, calculating any specific conditional probability is a
  simple matter of division. This direct, count-based approach is both
  computationally efficient and easy to interpret, as the resulting probabilities
  are directly tied to the evidence seen in the training data. The next section
  will walk through a concrete example of this calculation. However, as we will
  soon see, this direct reliance on observed counts leads to a significant problem
  when we encounter N-grams that never appeared in our training text.
