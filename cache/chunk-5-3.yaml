  Let's see this in action with a concrete example. Suppose you clone a mid-sized
  Express.js application from GitHub and ask:
  
  > Summarize the structure of this project and identify the main routes,
  > middleware, and models.
  
  Claude Code begins by reading `package.json` to catalog dependencies—Express,
  Mongoose, Passport, dotenv. It then lists the top-level directories and opens
  `src/index.ts` to find where the app is initialized. From there it fans out:
  
  - It reads files in `src/routes/` to enumerate API endpoints.
  - It opens `src/middleware/` to identify authentication, error handling, and
    logging layers.
  - It scans `src/models/` to catalog Mongoose schemas and their relationships.
  - It checks `src/config/` for environment and database configuration.
  
  The resulting summary reads like a short architecture document—one that would
  normally take a new team member a full afternoon to write from scratch.
