response:
  While graph-based methods attempt to find the highest-scoring dependency tree
  from all possible trees for a sentence, an alternative and highly efficient
  approach is **transition-based parsing**. Instead of scoring entire trees, a
  transition-based parser processes a sentence word by word, making a sequence of
  locally optimal decisions to build the final dependency graph. This method is
  often conceptualized as a state machine. It starts in an initial configuration,
  and at each step, it applies a *transition* (or *action*) to move to a new
  configuration, gradually constructing the dependency arcs. The process
  terminates when the sentence is fully processed and a complete tree has been
  formed.
  
  At the heart of a transition-based parser is its configuration, which typically
  consists of three components:
  
  - A **stack** ($\sigma$), which holds words that are currently being processed.
  - A **buffer** ($\beta$), which holds the sequence of words from the sentence
    that have not yet been processed.
  - A set of dependency **arcs** ($A$), which is initially empty and is
    incrementally built by the parser.
  
  The parser is initialized in a standard starting configuration. The stack
  contains a special `ROOT` token, representing the root of the dependency tree.
  The buffer contains all the words of the sentence in their original order. The
  set of arcs is empty. The goal of the parser is to reach a terminal
  configuration where the buffer is empty and the stack contains only the `ROOT`
  token.
  
  The parser moves from one configuration to another by applying one of a small
  set of defined actions. The most common system, known as an *arc-standard*
  parser, uses three primary actions:
  
  1. **SHIFT**: This action removes the first word from the buffer and pushes it
     onto the top of the stack. This is the primary way words are brought into
     consideration for forming dependency relationships. It is used when no
     dependency can yet be formed involving the word at the front of the buffer
     and the word on top of the stack.
  
  2. **LEFT-ARC** ($L_y$): This action asserts a head-dependent relationship. Let
     the word on top of the stack be $w_j$ and the second word from the top be
     $w_i$. The LEFT-ARC action creates a dependency arc $w_j \rightarrow w_i$,
     with the label $y$. This means $w_j$ is the head and $w_i$ is the dependent.
     After adding the arc to the set $A$, the dependent ($w_i$, the second word)
     is popped from the stack. This action is typically chosen when $w_i$ has
     found its head and will not be the head for any other words remaining on the
     stack or in the buffer.
  
  3. **RIGHT-ARC** ($R_y$): This action also asserts a head-dependent
     relationship. As before, let the word on top of the stack be $w_j$ and the
     second word from the top be $w_i$. The RIGHT-ARC action creates a dependency
     arc $w_i \rightarrow w_j$, with the label $y$. Here, $w_i$ is the head and
     $w_j$ is the dependent. After the arc is added to $A$, the dependent ($w_j$,
     the top word) is popped from the stack. This action is used when the word on
     top of the stack has found its head and has already been assigned all of its
     own dependents.
  
  The critical question, of course, is how the parser decides which action to take
  at each step. This decision is made by a component called an **oracle**. In
  modern transition-based parsers, this oracle is a supervised machine learning
  classifier. At each step in the parsing process, a feature vector is extracted
  from the parser's current configuration. These features might include the
  part-of-speech tags and word forms of the top few words on the stack, the first
  few words in the buffer, and information about previously constructed dependency
  arcs.
  
  The classifier, which has been trained on a large *treebank* (a corpus of
  sentences annotated with correct dependency trees), takes this feature vector as
  input and predicts the most likely valid action (SHIFT, LEFT-ARC, or RIGHT-ARC)
  for that specific configuration. The parser then executes this predicted action
  and moves to the next state. This process repeats until a terminal state is
  reached.
  
  The primary advantage of this approach is its efficiency. Since the parser makes
  a single pass through the sentence, making a constant number of decisions for
  each word, its computational complexity is linear in the length of the sentence,
  or $O(n)$. This makes transition-based parsers very fast and suitable for
  large-scale applications. However, their greedy nature—making locally optimal
  decisions without the ability to backtrack—means that an early mistake can lead
  to a cascade of subsequent errors, a problem known as error propagation. Despite
  this, the combination of speed and high accuracy from powerful machine learning
  oracles has made transition-based parsing a dominant and influential paradigm in
  the field. To make these abstract components and actions concrete, the next
  section will walk through a step-by-step example, illustrating how these pieces
  work together to parse a simple sentence.
