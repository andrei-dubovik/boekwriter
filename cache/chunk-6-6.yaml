response:
  While a Context-Free Grammar provides a formal and powerful mechanism for
  describing sentence structure, it also immediately brings a crucial challenge of
  natural language to the forefront: ambiguity. In many cases, a single sentence
  can be assigned more than one valid parse tree according to the rules of a given
  grammar. This phenomenon is known as *structural ambiguity* or *syntactic
  ambiguity*, and it is one of the most significant problems that a computational
  parser must address. Unlike lexical ambiguity, where a word has multiple
  meanings (e.g., 'bank' can be a financial institution or a river's edge),
  structural ambiguity arises from different ways of combining constituents.
  
  A classic illustration of this problem is the sentence "I saw a man with a
  telescope." This sentence has at least two distinct interpretations, and each
  corresponds to a different syntactic structure.
  
  - **Interpretation 1:** The man I saw was holding a telescope.
  - **Interpretation 2:** I used a telescope as an instrument to see the man.
  
  These two meanings are not a result of any word having multiple definitions;
  they are a direct consequence of how the prepositional phrase (PP) *'with a
  telescope'* attaches to the rest of the sentence. In the first interpretation,
  the PP modifies the noun phrase (NP) *'a man'*. The phrase 'a man with a
  telescope' acts as a single, large NP, which is the direct object of the verb
  'saw'. This is often called *low attachment* because the PP attaches to a
  constituent low in the parse tree. In the second interpretation, the PP modifies
  the verb phrase (VP) *'saw a man'*. Here, the PP describes how the seeing action
  was performed. This is known as *high attachment*, as the PP attaches to the
  main VP, higher up in the tree. As illustrated in **Fig. 6.6**, these two
  interpretations correspond to two distinct and equally valid parse trees that
  can be generated by a plausible English grammar.
  
  This problem, known as *PP-attachment ambiguity*, is just one of several types
  of structural ambiguity that are pervasive in language. Other common forms
  include:
  
  - **Coordination Ambiguity:** This occurs with conjunctions like 'and'. For
    example, in the phrase 'young men and women', does 'young' modify only 'men',
    resulting in the structure `[young men] and [women]`, or does it modify the
    entire coordinated phrase, giving `young [men and women]`? The correct
    interpretation depends entirely on context.
  - **Noun Compound Ambiguity:** The structure of noun compounds can be ambiguous.
    The phrase 'student feedback system' could mean a system for providing
    feedback to students `student [feedback system]` or a system that processes
    feedback from students `[student feedback] system`.
  
  The existence of structural ambiguity has profound implications. First, and most
  importantly, it means that syntax and semantics are deeply intertwined; a
  different parse tree leads directly to a different meaning. Any system aiming
  for genuine language understanding must have a strategy for
  *disambiguation*—choosing the most plausible structure among the many
  possibilities. Second, the number of potential parse trees for a sentence can
  grow exponentially with its length, a problem known as combinatorial explosion.
  A single, moderately complex sentence can have hundreds or even thousands of
  valid parses. This makes parsing a significant computational challenge.
  Consequently, a parser must not only be able to find valid structures according
  to a grammar but must also do so efficiently and have a principled way to select
  the most likely parse, a topic that motivates the algorithms and probabilistic
  models we will explore next.
