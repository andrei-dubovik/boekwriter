  To make the CYK algorithm concrete, let's walk through the process of parsing
  the sentence "she eats fish". We will use a simple Context-Free Grammar already
  converted to Chomsky Normal Form. Assume our grammar contains the following
  rules:
  
  - **Lexical Rules:**
    - $PRP \rightarrow \text{'she'}$
    - $V \rightarrow \text{'eats'}$
    - $N \rightarrow \text{'fish'}$
  - **Structural Rules:**
    - $S \rightarrow NP \ VP$
    - $NP \rightarrow PRP$
    - $NP \rightarrow N$
    - $VP \rightarrow V \ NP$
  
  Our goal is to populate a parsing chart, often called a CYK chart or well-formed
  substring table, to determine if the start symbol `S` can generate the entire
  sequence of words. This chart, shown in **Fig. 6.8**, is an upper-triangular
  matrix where each cell `P[i, j]` will store the set of non-terminals that can
  generate the substring of words from position `i` to `j`. Let our words be
  indexed as $w_1, w_2, w_3$.
  
  **Step 1: Initialization (Spans of Length 1)**
  
  We begin by filling the diagonal of the chart, which corresponds to spans of a
  single word. We look for all lexical rules $A \rightarrow w_k$ in our grammar.
  
  - **Cell `P[1, 1]` for 'she' ($w_1$):** The rule $PRP \rightarrow \text{'she'}$
    applies. We add `PRP` to the cell. We must also consider any unit productions
    that can be reached from `PRP`. The rule $NP \rightarrow PRP$ allows us to add
    `NP` as well. So, `P[1, 1] = {PRP, NP}`.
  - **Cell `P[2, 2]` for 'eats' ($w_2$):** The rule $V \rightarrow \text{'eats'}$
    applies. There are no further unit productions from `V`. So, `P[2, 2] = {V}`.
  - **Cell `P[3, 3]` for 'fish' ($w_3$):** The rule $N \rightarrow \text{'fish'}$
    applies. From `N`, the rule $NP \rightarrow N$ allows us to add `NP`. So,
    `P[3, 3] = {N, NP}`.
  
  After this step, the diagonal of our chart is filled, representing the possible
  grammatical categories for each individual word.
  
  **Step 2: Filling the Chart (Spans of Length 2)**
  
  Now we move to spans of length two. For each cell `P[i, j]` where the span
  length `j - i + 1` is two, we look for all possible split points `k`. We check
  if any rule $A \rightarrow B \ C$ exists where $B \in P[i, k]$ and
  $C \in P[k+1, j]$.
  
  - **Cell `P[1, 2]` for 'she eats' ($w_1 w_2$):** The only possible split is at
    $k=1$. We need to find a rule $A \rightarrow B \ C$ where $B \in P[1, 1]$ and
    $C \in P[2, 2]$.
    - We check combinations from $P[1, 1] = \{PRP, NP\}$ and $P[2, 2] = \{V\}$.
    - Is there a rule $A \rightarrow PRP \ V$? No.
    - Is there a rule $A \rightarrow NP \ V$? No.
    - Since no rules match, cell `P[1, 2]` remains empty.
  - **Cell `P[2, 3]` for 'eats fish' ($w_2 w_3$):** The only split is at $k=2$. We
    need a rule $A \rightarrow B \ C$ where $B \in P[2, 2] = \{V\}$ and
    $C \in P[3, 3] = \{N, NP\}$.
    - Is there a rule $A \rightarrow V \ N$? No.
    - Is there a rule $A \rightarrow V \ NP$? Yes, $VP \rightarrow V \ NP$.
    - Therefore, we add `VP` to this cell. `P[2, 3] = {VP}`.
  
  **Step 3: Filling the Final Cell (Spans of Length 3)**
  
  Finally, we compute the entry for the top-right cell, `P[1, 3]`, which covers
  the entire sentence. The span length is three, so there are two possible split
  points: $k=1$ and $k=2$.
  
  - **Split 1 ($k=1$):** Check for rules $A \rightarrow B \ C$ where
    $B \in P[1, 1]$ and $C \in P[2, 3]$.
    - $P[1, 1] = \{PRP, NP\}$ and $P[2, 3] = \{VP\}$.
    - We check for rules like $A \rightarrow PRP \ VP$ (no) and
      $A \rightarrow NP \ VP$ (yes, $S \rightarrow NP \ VP$).
    - This split successfully finds the start symbol `S`. We add `S` to `P[1, 3]`.
  - **Split 2 ($k=2$):** Check for rules $A \rightarrow B \ C$ where
    $B \in P[1, 2]$ and $C \in P[3, 3]$.
    - Since `P[1, 2]` is empty, this split cannot produce any non-terminals.
  
  The final content of the top cell is `P[1, 3] = {S}`. The completed chart is
  shown in **Fig. 6.8**. Because the start symbol `S` is present in the cell
  corresponding to the entire sentence (`P[1, 3]`), we conclude that "she eats
  fish" is a valid sentence according to our grammar. If `S` were not found in
  this cell, the sentence would be rejected as ungrammatical. To reconstruct the
  actual parse tree, a practical implementation of CYK also stores backpointers in
  each cell to remember which rule and which sub-constituents were used to add
  each non-terminal.
