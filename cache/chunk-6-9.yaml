response:
  Having established how constituency grammars model sentence structure through
  hierarchical phrases, we now shift our focus to an alternative and equally
  influential paradigm: *dependency parsing*. Rather than focusing on nested
  constituents, dependency parsing represents grammatical structure by identifying
  the relationships between individual words. The core idea is that for any
  sentence, the syntactic structure consists of a set of directed, binary, and
  asymmetrical links between words.
  
  In this framework, every relationship connects a *head* (also called a governor)
  to a *dependent* (or modifier). The head is the word that is grammatically
  dominant, while the dependent is the word that modifies or is an argument of the
  head. For example, in the phrase "big dogs", the noun *dogs* is the head, and
  the adjective *big* is its dependent, as *big* modifies *dogs*. These directed
  links, called *dependencies*, are typically labeled to specify the exact nature
  of their grammatical function. These labels come from a standardized set, such
  as the Universal Dependencies (UD) tagset, which includes common functions like
  `nsubj` (nominal subject), `obj` (direct object), `amod` (adjectival modifier),
  and `det` (determiner).
  
  The complete dependency structure for a sentence is represented as a *dependency
  tree* (or, more formally, a directed acyclic graph). To ensure that every word
  is connected and the structure forms a single tree, a special pseudo-word, often
  labeled `ROOT`, is introduced. The `ROOT` node acts as the head of the main
  predicate of the sentence, which is usually the main verb. A well-formed
  dependency tree for a sentence with *n* words must satisfy three key
  constraints:
  
  1. The `ROOT` node has no incoming arcs (it has no head).
  2. Every other word has exactly one incoming arc (it has exactly one head).
  3. The graph is acyclic.
  
  Together, these constraints ensure that the resulting structure is a tree where
  every word in the sentence is ultimately a dependent of the `ROOT` node. This
  approach provides a lexicalized representation of grammar, as the structure is
  built directly between the words themselves, without the need for intermediate
  phrasal nodes like NP or VP.
  
  Let's return to our familiar example, "The cat sat on the mat," to see how a
  dependency parser would analyze it. The resulting dependency tree would consist
  of the following set of labeled arcs, represented here as
  `(head, label, dependent)` triples:
  
  - `(ROOT, root, sat)`: *sat* is the root of the sentence.
  - `(sat, nsubj, cat)`: *cat* is the nominal subject of *sat*.
  - `(cat, det, The)`: *The* is the determiner for *cat*.
  - `(sat, prep, on)`: *on* is a prepositional modifier of *sat*.
  - `(on, pobj, mat)`: *mat* is the object of the preposition *on*.
  - `(mat, det, the)`: *the* is the determiner for *mat*.
  
  Notice how this structure differs from a constituency parse. There are no nodes
  for "the cat" (NP) or "on the mat" (PP). Instead, the relationships are direct:
  *The* modifies *cat*, and *cat* is the subject of *sat*. This direct,
  word-to-word representation can be particularly advantageous for languages with
  more flexible word order, where constituents may not be contiguous. Furthermore,
  the dependency labels often map more directly to the semantic roles that words
  play, making the output of a dependency parser a valuable input for downstream
  tasks like information extraction and question answering.
