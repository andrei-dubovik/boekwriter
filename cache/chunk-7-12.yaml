response:
  Having explored how to represent the meaning of individual words, we now turn to
  a fundamental question: how do these individual meanings combine to create the
  meaning of phrases and sentences? We rarely communicate in isolated words; we
  combine them into complex structures to express complex ideas. This is the
  central concern of *compositional semantics*.
  
  The guiding principle in this field is the **Principle of Compositionality**, a
  concept most often attributed to the German logician and philosopher Gottlob
  Frege.[^1] The principle states that the meaning of a complex expression is a
  function of the meanings of its parts and of the syntactic rules by which they
  are combined. This idea is powerfully intuitive. We understand the sentence "The
  student read the book" because we know the meanings of *student*, *read*, and
  *book*, and we understand how the English grammatical structure assigns roles to
  each of them. If we change the structure to "The book read the student," the
  sentence becomes nonsensical, even though the component words and their lexical
  meanings remain identical. The rules of combination are just as important as the
  meanings of the parts.
  
  We can formalize this principle abstractly. If an expression $E$ is composed of
  two parts, $\alpha$ and $\beta$, its meaning $M(E)$ can be expressed as a
  function of the meanings of its parts:
  
  $M(E) = f_{\text{compose}}(M(\alpha), M(\beta))$
  
  Here, $f_{\text{compose}}$ is the composition function that is guided by the
  syntactic structure combining $\alpha$ and $\beta$. The central challenge for
  computational semantics is defining this function. Now that we have powerful
  vector representations for lexical meaning (i.e., word embeddings), the question
  becomes: what is the right $f_{\text{compose}}$ for combining word vectors into
  phrase or sentence vectors? How do we computationally model the way meaning is
  constructed? The following sections will explore several approaches to this very
  problem.
  
  [^1]: While the principle is widely known as "Frege's Principle," its explicit
  formulation in his work is a subject of scholarly debate. Regardless of
  attribution, it remains the foundational assumption of most formal and
  computational semantics.
