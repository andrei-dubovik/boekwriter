response:
  While simple compositional techniques like vector addition can capture the
  general topic of a phrase, they are fundamentally limited. The meaning of a
  sentence like "The cat chased the mouse" is not merely the sum of its parts; it
  is a structured event with distinct participants playing specific roles.
  Averaging the vectors for `cat`, `chased`, and `mouse` would give us a
  representation in the semantic neighborhood of felines, rodents, and pursuit,
  but it critically fails to preserve the information of *who* did the chasing and
  *who* was chased. To capture this vital relational information, we need a more
  sophisticated model of sentence-level semantics.
  
  This brings us to the task of **Semantic Role Labeling (SRL)**, a process that
  aims to uncover the underlying predicate-argument structure of a sentence. Often
  described as determining "who did what to whom, where, when, and how," SRL
  provides a shallow semantic representation of events. The core idea is to
  identify the main predicate of a sentence—typically a verb—and then identify and
  label the phrases (arguments) that fill the semantic roles associated with that
  predicate. This moves beyond simple co-occurrence to model the explicit
  relationships between participants in an event.
  
  Consider the sentence: *“The startup will launch its innovative new app in
  Singapore next quarter.”* An SRL system would first identify the predicate,
  which is the event-denoting word `launch`. It would then identify and label the
  arguments associated with this predicate's frame of meaning:
  
  - **Agent (The doer):** *The startup*
  - **Theme (The thing being acted upon):** *its innovative new app*
  - **Location (Where the event happens):** *in Singapore*
  - **Time (When the event happens):** *next quarter*
  
  By identifying these roles, SRL extracts a structured representation of the
  sentence's meaning:
  `LAUNCH(Agent: The startup, Theme: its innovative new app, Location: in Singapore, Time: next quarter)`.
  This structured output is far more useful for downstream tasks like question
  answering or information extraction than a single sentence vector.
  
  It is crucial to distinguish semantic roles from syntactic roles. Syntactic
  parsing identifies grammatical functions like *subject* and *direct object*,
  which are tied to the sentence's structure. Semantic roles, in contrast, are
  tied to the underlying meaning. For example, consider these two sentences:
  
  1. \*\[The researcher\]_Subject_ published \_\[the paper\]_Object_.
  2. \*\[The paper\]_Subject_ was published by \_\[the researcher\]_Object of
     Preposition_.
  
  Syntactically, the subject of sentence (1) is "The researcher," while the
  subject of sentence (2) is "The paper." However, in terms of meaning, "The
  researcher" is the *Agent* (the one doing the publishing) in both sentences, and
  "the paper" is the *Patient* or *Theme* (the thing being published). SRL
  abstracts away from these syntactic variations to produce a consistent semantic
  representation, capturing the fact that both sentences describe the very same
  event. This ability to normalize meaning across different surface forms makes
  SRL a powerful tool for computational language understanding. The next section
  will explore the lexical resources that formally define these roles.
