response:
  Machine Translation (MT) stands as one of the oldest and most ambitious goals in
  the history of computer science. The dream of automatic translation is nearly as
  old as the electronic computer itself. Long before the term "artificial
  intelligence" was coined, researchers envisioned machines that could break down
  language barriers, a quest that began in earnest after World War II. The field's
  origins are often traced to a 1949 memorandum by scientist Warren Weaver, who
  famously proposed treating translation as a problem of cryptography—essentially
  "decoding" a foreign language.
  
  This early optimism fueled efforts like the 1954 Georgetown-IBM experiment, a
  public demonstration that successfully translated a small set of Russian
  sentences into English. The initial hype, however, soon met the profound
  complexity of human language. The influential 1966 ALPAC report concluded that
  progress was slow and expensive, ushering in a long "AI winter" for MT research.
  It was only with the rise of new data-driven statistical and neural methods that
  the field experienced its modern renaissance. This dramatic history, from early
  rule-based systems to today's powerful models, is outlined in the timeline in
  **Fig. 9.1**.
