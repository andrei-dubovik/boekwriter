  01. Begin with the historical context of machine translation, framing it as one
      of the earliest and most ambitious goals of artificial intelligence.
  02. Define the core task of machine translation and introduce the three major
      paradigms to be discussed: rule-based, statistical, and neural.
  03. Illustrate the fundamental challenges of translation, such as lexical and
      structural ambiguity, using cross-linguistic examples.
  04. Introduce the concept of a parallel corpus as the essential bilingual text
      data required to train modern MT systems.
  05. Explain how the quality of machine translation is quantitatively measured
      using automated evaluation metrics like the BLEU score.
  06. Introduce Statistical Machine Translation (SMT) by framing the task
      probabilistically using the noisy channel model and Bayes' theorem.
  07. Detail the crucial sub-task of word alignment, which involves learning the
      correspondence between words in a source and target sentence pair.
  08. Provide a conceptual overview of the IBM Models for learning word alignment
      probabilities directly from parallel corpora.
  09. Explain the leap from word-based models to phrase-based SMT, which
      translates contiguous sequences of words to improve fluency.
  10. Describe the decoding process in SMT as a complex search problem for finding
      the highest-probability translation among countless possibilities.
  11. Present a simplified case study of a phrase-based SMT system translating a
      short English sentence into another language.
  12. Motivate the paradigm shift to Neural Machine Translation (NMT) by
      highlighting the limitations of SMT, such as feature engineering and context
      handling.
  13. Introduce the foundational sequence-to-sequence architecture, detailing how
      an encoder network reads the source sentence and a decoder network generates
      the target sentence.
  14. Explain the information bottleneck problem inherent in early encoder-decoder
      models where the entire source sentence meaning is compressed into a single
      vector.
  15. Detail the revolutionary attention mechanism, which overcomes the bottleneck
      by allowing the decoder to dynamically focus on relevant parts of the source
      input at each step.
  16. Use a visualization of an attention matrix as a pedagogical aid to
      demonstrate how the model aligns source and target words during translation.
  17. Briefly discuss the Transformer architecture, noting how it replaced
      recurrent layers with self-attention to become the state-of-the-art for NMT.
  18. Showcase the qualitative leap in translation quality with a compelling
      example comparing outputs from SMT and NMT systems for the same source
      sentence.
  19. Summarize the chapter by contrasting the core philosophies of SMT and NMT.
  20. Conclude by discussing current challenges and future directions in machine
      translation, including low-resource languages and multimodality.
  
  Consider point 15 of the plan. Write this part of the book. Be consise in your
  writing, avoid an overly verbose prose. Use Markdown for paragraphs, emphasis,
  numbered or unnumbered lists. Use LaTeX for formulas. Do not add any headers.
  Footnotes are allowed but should be used sparingly. In total, you should write
  between 675 and 900 words.
  
