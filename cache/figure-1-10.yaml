prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To see how the different branches of computational linguistics come together,
  consider one of its most ubiquitous applications: a virtual assistant like
  Amazon's Alexa or Google Assistant. These systems appear to have a seamless,
  singular ability to converse, but this illusion is built upon a cascade of
  distinct computational tasks. This entire sequence is visualized in the
  processing pipeline shown in Fig. 1.10. Let's trace the journey of a simple
  spoken command: *"Hey assistant, what's the weather like in Paris tomorrow?"*
  
  The first challenge is to convert the physical sound waves of your voice into
  digital text. This is the domain of **Automatic Speech Recognition (ASR)**. The
  assistant's microphone captures the utterance, and an ASR model, trained on
  thousands of hours of speech data, transcribes it into the text string: "what's
  the weather like in paris tomorrow". This process must be robust enough to
  handle a vast range of accents, speaking speeds, and background noise. A single
  transcription error at this stage can cause the entire interaction to fail.
  
  Once the command exists as text, the system must decipher its meaning, a task
  known as **Natural Language Understanding (NLU)**. NLU's goal is to transform
  the unstructured string of words into a structured, machine-readable format. It
  does this by identifying two key things:
  
  - **Intent:** The user's core goal. In this case, the intent is to
    `GetWeatherForecast`.
  - **Entities (or Slots):** The specific pieces of information needed to fulfill
    the intent. Here, the entities are `Location: Paris` and `Date: tomorrow`.
  
  The output of the NLU component is no longer just a sequence of words, but a
  structured representation like:
  `{ intent: GetWeatherForecast, location: "Paris", date: "tomorrow" }`.
  
  This structured data is passed to the **Dialogue Manager (DM)**, the system's
  brain. The DM maintains the state of the conversation and decides what action to
  take. Seeing the `GetWeatherForecast` intent, it knows it must query an external
  service, such as a weather API. It uses the extracted entities to populate this
  query, requesting the forecast for "Paris" on the relevant date. If the NLU
  module had failed to identify a location (e.g., if the user had just asked,
  "What's the weather like tomorrow?"), the DM's logic would decide to ask a
  clarifying question: "For which city?".
  
  After the DM retrieves the information from the weather service—say,
  `{ forecast: "sunny", high: "15°C" }`—it must deliver this answer to the user.
  This is where **Natural Language Generation (NLG)** comes in. The NLG module
  takes the structured data from the API and converts it into a well-formed,
  natural-sounding sentence, such as: "The weather in Paris tomorrow will be
  sunny, with a high of 15 degrees Celsius."
  
  Finally, this generated text string is sent to a **Text-to-Speech (TTS)** or
  speech synthesis engine. The TTS system converts the text back into audible
  speech, producing the synthesized voice that you hear as the final response.
  This intricate, multi-stage process—from speech to text, text to meaning,
  meaning to action, action to text, and text back to speech—all happens in just a
  few seconds, perfectly illustrating how multiple sub-fields of computational
  linguistics are integrated to create a single, powerful application.
  
  This fragment refers to Fig. 1.10. The figure in question is a "Diagram" and its
  description is as follows:
  
  A flowchart showing the processing pipeline for a spoken command given to a
  virtual assistant. It will illustrate the sequence of interconnected CL tasks:
  Automatic Speech Recognition -> Natural Language Understanding -> Dialogue
  Management -> Natural Language Generation -> Text-to-Speech.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
