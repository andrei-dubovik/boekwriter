    converting speech to text. The text is then interpreted by Natural Language
    Understanding (NLU) to extract intent and entities. A Dialogue Manager (DM) uses
    this structured data to decide on an action, potentially querying an external
    API. The result is formulated into a sentence by the Natural Language Generation
    (NLG) module, and finally converted back into audible speech by a Text-to-Speech
    (TTS) engine.
