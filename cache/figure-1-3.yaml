prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To appreciate the complexity that computational linguistics addresses, consider
  a seemingly simple sentence:
  
  *I saw a man on a hill with a telescope.*
  
  For a human, understanding this sentence feels effortless. We might briefly
  register a slight ambiguity, but context or common sense usually guides us to a
  single, intended meaning. For a computer, however, this sentence presents a
  significant challenge. The string of words is grammatically correct, yet it
  allows for at least two distinct interpretations based on its underlying
  structure:
  
  1. There is a man on a hill, and I used a telescope to see him. In this case,
     the telescope is the instrument of the action 'saw'.
  2. There is a man on a hill, and that hill also has a telescope on it. In this
     case, the telescope is part of the description of the hill.
  
  This is a classic example of *structural ambiguity*, also known as syntactic
  ambiguity. The uncertainty doesn't come from the words themselves but from how
  they can be grammatically combined. The source of the confusion is the
  prepositional phrase *with a telescope*. What does it modify? Does it attach to
  the verb phrase (*saw...with a telescope*) or the noun phrase (*a hill with a
  telescope*)?
  
  This ambiguity is visually represented in the two syntactic parse trees shown in
  Fig. 1.3. In one tree, the phrase *with a telescope* attaches to the verb phrase
  headed by *saw*, modifying the act of seeing. In the other, it attaches to the
  noun phrase *a hill*, modifying the location. Both are perfectly valid
  grammatical structures. A computational system, however, has no innate
  understanding of the world to help it decide. It cannot know if the speaker is
  an astronomer or is describing a landmark. Without a mechanism to resolve this
  ambiguity, a system cannot reliably answer questions like "What did you use to
  see the man?" or "What was on the hill?"
  
  Resolving this kind of ambiguity is a central task in computational linguistics.
  It requires a powerful combination of disciplines. From *linguistics*, we borrow
  the formalisms of syntax that allow us to identify and represent these different
  possible structures. From *computer science* and *artificial intelligence*, we
  leverage algorithms to parse the sentence and statistical models to determine
  which structure is more probable. For instance, a model trained on a vast amount
  of text might learn that the verb 'saw' is far more frequently modified by the
  instrument 'with a telescope' than the noun 'hill' is. This single, illustrative
  sentence thus encapsulates the core challenge of the field: to make the
  implicit, probabilistic reasoning that humans perform so easily explicit and
  computable.
  
  This fragment refers to Fig. 1.3. The figure in question is a "Diagram" and its
  description is as follows:
  
  A diagram showing two different syntactic parse trees for the sentence 'I saw a
  man on a hill with a telescope'. This will visually represent the concept of
  structural ambiguity, a core challenge in the field, by showing how the phrase
  'with a telescope' can attach to either 'hill' or 'saw'.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
