  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  The history of computational linguistics is not one of steady, linear progress
  but is better understood as a series of major paradigm shifts, each driven by
  new theoretical insights and advancements in computing power. As summarized in
  the timeline in Fig. 1.5, we can broadly identify three distinct eras that have
  shaped the field.
  
  The journey began in the 1950s, alongside the dawn of artificial intelligence
  itself. This first phase, often called the *symbolic* or *rule-based era*, was
  characterized by attempts to explicitly encode linguistic knowledge. Researchers
  believed that by writing down a sufficient number of grammatical rules and
  dictionary entries, they could enable machines to understand and translate
  language. This approach dominated the field for several decades but often
  struggled with the vast complexity and ambiguity inherent in human language.
  
  The late 1980s and 1990s witnessed the *statistical revolution*. This marked a
  profound shift away from handcrafted rules and towards learning probabilistic
  patterns directly from large digital text collections known as corpora. Finally,
  the 2010s ushered in the current *deep learning era*, where neural networks have
  redefined the state of the art, enabling unprecedented performance on a wide
  array of language tasks.
  
  This fragment refers to Fig. 1.5. The figure in question is a "Timeline" and its
  description is as follows:
  
  A timeline graphic charting the major eras in the history of computational
  linguistics. It will highlight key periods and events, such as the early
  symbolic/rule-based era (1950s-1980s), the statistical revolution (late
  1980s-2000s), and the current deep learning era.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
