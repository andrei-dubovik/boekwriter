prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Once an IR system returns a list of documents, how do we measure its success?
  The quality of a search result is not a simple binary judgment. To formally
  evaluate performance, we rely on metrics that capture different aspects of
  relevance. The two most fundamental of these are *precision* and *recall*.
  
  Precision answers the question: *Of the documents the system retrieved, what
  fraction were actually relevant?* It is a measure of exactness or fidelity. If
  every document you see is on-topic, the system has high precision. Recall, on
  the other hand, answers: *Of all the relevant documents that exist in the
  collection, what fraction did the system find?* It is a measure of completeness.
  If the system found every possible relevant document, it has high recall.
  
  These concepts are often visualized using the sets of retrieved and relevant
  documents, as shown in **Fig. 10.10**. To formalize this, we can categorize any
  document as a *True Positive* (relevant and retrieved), a *False Positive*
  (retrieved but not relevant), or a *False Negative* (relevant but not
  retrieved). The formulas are then:
  
  - $\text{Precision} = \frac{\text{True Positives}}{\text{True Positives} + \text{False Positives}}$
  - $\text{Recall} = \frac{\text{True Positives}}{\text{True Positives} + \text{False Negatives}}$
  
  There is an inherent trade-off between these two metrics. A system designed for
  maximum recall could simply return every document in the collection,
  guaranteeing it finds all relevant ones (100% recall) but with abysmal
  precision. Conversely, a cautious system that returns only a single document it
  is extremely confident about might achieve perfect precision but have terrible
  recall. Balancing this trade-off is a central challenge in designing IR systems.
  
  This fragment refers to Fig. 10.10. The figure in question is a "Diagram" and
  its description is as follows:
  
  A classic Venn diagram to define precision and recall. One circle will represent
  the set of 'Relevant Documents' and an overlapping circle will represent the
  'Retrieved Documents'. The intersecting area will be labeled 'True Positives',
  visually grounding the concepts of precision (the fraction of retrieved
  documents that are relevant) and recall (the fraction of relevant documents that
  are retrieved).
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
