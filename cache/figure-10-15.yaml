prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To make the goal of Information Extraction more concrete, consider the
  difference between finding a document and understanding its contents. While an
  IR system would successfully retrieve a news article about a corporate
  acquisition, an IE system would process that same article to pull out the key
  facts. Imagine the system encounters the following text in a press release:
  "Global Tech Inc. announced today its definitive agreement to acquire Innovate
  Solutions for a staggering \$2.5 billion."
  
  The objective of IE is to automatically populate a structured record, like a
  database table, from this unstructured sentence. As shown in **Fig. 10.15**, the
  system must identify specific text fragments and map them to predefined slots.
  It needs to recognize that "Global Tech Inc." is the *Acquirer*, "Innovate
  Solutions" is the *Target Company*, and "\$2.5 billion" is the *Acquisition
  Price*. This process effectively transforms a block of prose into a row of data
  that can be easily queried, aggregated, and analyzed. The core challenge lies in
  building models that can perform this mapping accurately across countless
  variations in phrasing and sentence structure.
  
  This fragment refers to Fig. 10.15. The figure in question is a "Illustration"
  and its description is as follows:
  
  A side-by-side illustration contrasting unstructured text with structured
  output. On the left, a paragraph of sample text about a corporate acquisition
  will be shown. On the right, a structured table with columns like 'Acquirer',
  'Target Company', and 'Acquisition Price' will be populated with data extracted
  from the text. Arrows will connect the specific phrases in the text to their
  corresponding cells in the table.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
