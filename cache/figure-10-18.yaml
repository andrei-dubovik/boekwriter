prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  While rule-based systems are intuitive, they are often brittle and require
  significant manual effort to create and maintain. Modern approaches have largely
  shifted towards statistical models by framing NER as a *sequence labeling* task.
  This paradigm should be familiar, as it is the same fundamental approach we used
  for Part-of-Speech tagging in Chapter 5. The goal is to assign a label from a
  predefined set of tags to each token in an input sequence.
  
  However, NER presents a challenge not found in POS tagging: entities can span
  multiple tokens. For instance, in "Maria Rossi," we need to know that both words
  refer to a single entity. A simple tag set like `{PER, LOC, ORG}` is
  insufficient. To address this, we use a more expressive tagging scheme, the most
  common of which is the **BIO** encoding:
  
  - **B-TYPE**: Marks the *Beginning* of an entity of a certain type.
  - **I-TYPE**: Marks the *Inside* of an entity, used for the second and
    subsequent tokens.
  - **O**: Marks a token as being *Outside* any named entity.
  
  This scheme allows a model to explicitly mark the boundaries of multi-word
  entities. As shown in **Fig. 10.18**, the sentence "Maria Rossi moved to Rome."
  is transformed into a sequence of token-tag pairs. The token `Maria` is labeled
  `B-PER` as it begins a person entity, while `Rossi` is labeled `I-PER`,
  indicating it is inside the same person entity. The single-word entity `Rome` is
  tagged with `B-LOC`[^1], and the remaining tokens are tagged with `O`.
  
  By converting raw text into this labeled sequence format, we can leverage
  powerful machine learning algorithms. Models like Hidden Markov Models (HMMs),
  Conditional Random Fields (CRFs), and modern neural networks can be trained on
  annotated corpora to learn how to predict the most probable sequence of BIO tags
  for a new, unseen sentence. These models make their predictions by learning from
  the features of the words themselves and the context in which they appear.
  
  This fragment refers to Fig. 10.18. The figure in question is a "Diagram" and
  its description is as follows:
  
  A diagram that frames Named Entity Recognition as a sequence labeling task. A
  sample sentence (e.g., 'Maria Rossi moved to Rome.') will be shown as a sequence
  of tokens at the bottom. Above each token, a corresponding label from the BIO
  (Beginning, Inside, Outside) tagging scheme will be displayed (e.g., B-PER,
  I-PER, O, O, B-LOC), clearly illustrating the input and desired output for a
  statistical model.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
  
  [^1]: Note that for single-token entities, the `B-` tag is used by convention. There
  is no corresponding `I-` tag.
