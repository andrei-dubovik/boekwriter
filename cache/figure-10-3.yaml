prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  At its core, the Information Retrieval (IR) problem is about satisfying a user's
  *information need*. We can formally define the classic IR task using three main
  components. First, there is a static **document collection**, which is a set of
  texts $D = \{d_1, d_2, ..., d_N\}$ through which we want to search. Second, a
  user provides a **query**, $q$, which is a representation of their information
  need, typically expressed as a short string of keywords.
  
  The objective of an IR system is to process the query $q$ against the collection
  $D$ and return a **ranked list of documents**. This list is ordered by
  *relevance*, with the documents that the system predicts are most likely to
  satisfy the user's need placed at the top. The high-level architecture of this
  process, from query input to ranked output, is visualized in Fig. 10.3. The
  central challenge, therefore, is to accurately and efficiently model this notion
  of relevance. The upcoming sections will explore the fundamental data structures
  and algorithms used to accomplish this.
  
  This fragment refers to Fig. 10.3. The figure in question is a "Diagram" and its
  description is as follows:
  
  A flowchart-style diagram illustrating the high-level architecture of a classic
  Information Retrieval system. It will show a 'User Query' as input to a central
  'IR System' box. This central box will be shown to use a 'Document Collection'
  and an 'Inverted Index'. The final output from the system will be a 'Ranked List
  of Documents'.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
