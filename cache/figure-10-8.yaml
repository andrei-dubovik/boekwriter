prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  In a monorepo, a single `CLAUDE.md` rarely fits every package. Claude Code
  solves this by composing context from *all* `CLAUDE.md` files it encounters from
  the repository root down to your current working directory. Place shared
  conventions—linting rules, commit formats, CI commands—in the root file, then
  add package-specific guidance in each subdirectory (see Fig. 10.8).
  
  When you run Claude Code inside `packages/api/`, it reads the root file first,
  then layers the API-specific file on top. Child files *extend* the root; they
  never replace it. This keeps each file focused and short, spending tokens only
  on what differs between packages.
  
  This fragment refers to Fig. 10.8. The figure in question is a "Diagram" and its
  description is as follows:
  
  A directory-tree diagram of a monorepo showing how multiple CLAUDE.md files
  layer and inherit context. The root of the tree is the repository directory
  containing a root-level CLAUDE.md labeled 'Shared conventions: linting rules,
  commit message format, CI pipeline commands'. Below it, two package directories
  branch out: 'packages/api/' containing its own CLAUDE.md labeled 'Express route
  patterns, REST naming conventions, auth middleware usage' and 'packages/web/'
  containing its own CLAUDE.md labeled 'React component structure, state
  management via Zustand, CSS module conventions'. Dashed arrows flow downward
  from the root CLAUDE.md into each package-level CLAUDE.md to visually indicate
  that the child files inherit and extend the root-level context rather than
  replacing it. A brief annotation beside the arrows reads 'Child files add
  specificity; root file provides shared baseline.' This diagram makes the
  inheritance and scoping mechanic immediately intuitive in a way that prose alone
  cannot, clarifying that Claude Code composes context from all applicable
  CLAUDE.md files from the root down to the current working directory.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
