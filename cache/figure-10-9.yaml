prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  With both documents and the query represented as TF-IDF vectors, the task of
  ranking becomes a geometric problem: measuring the proximity between the query
  vector **q** and each document vector **d**. In the vector space model, the
  standard measure is *cosine similarity*. This metric is effective because it
  measures the angle between two vectors, making it sensitive to the orientation
  (the topics) rather than the magnitude (the length of the documents).
  
  The similarity is calculated as the cosine of the angle $\theta$ between the two
  vectors:
  \$$
  \text{similarity}(\mathbf{q}, \mathbf{d}) = \cos(\theta) = \frac{\mathbf{q} \cdot \mathbf{d}}{||\mathbf{q}|| \ ||\mathbf{d}||}
  $\$
  The resulting score ranges from 0 to 1 for non-negative TF-IDF vectors. A score
  closer to 1 signifies a smaller angle and thus higher conceptual similarity. As
  illustrated in Fig. 10.9, the document vector **d1** is deemed more relevant to
  the query **q** than **d2** because the angle between them is smaller. An IR
  system computes this similarity score for every document in the collection and
  then sorts the documents in descending order to generate the final ranked list
  of results.
  
  This fragment refers to Fig. 10.9. The figure in question is a "Diagram" and its
  description is as follows:
  
  A 2D vector space diagram to intuitively explain cosine similarity. The diagram
  will show a query vector ('q') and two document vectors ('d1' and 'd2')
  originating from the same point. The angle between 'q' and 'd1' will be visibly
  smaller than the angle between 'q' and 'd2', illustrating that 'd1' is
  considered more relevant to the query.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
