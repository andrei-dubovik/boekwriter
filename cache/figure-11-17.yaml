prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Once a sentiment classifier is trained, we need a systematic way to measure its
  performance. A simple "percentage correct" can be misleading, especially with
  imbalanced data. A more nuanced evaluation starts with a *confusion matrix*,
  which visualizes how the model's predictions align with the true labels, as
  shown in Fig. 11.17. This matrix categorizes predictions into four types:
  
  - **True Positives (TP):** Positive instances correctly identified as positive.
  - **True Negatives (TN):** Negative instances correctly identified as negative.
  - **False Positives (FP):** Negative instances incorrectly labeled as positive
    (a Type I error).
  - **False Negatives (FN):** Positive instances incorrectly labeled as negative
    (a Type II error).
  
  From these counts, we derive several key metrics. *Accuracy* is the most
  intuitive, representing the overall fraction of correct predictions:
  \$$ \text{Accuracy} = \frac{TP + TN}{TP + TN + FP + FN} $\$
  
  To understand the trade-offs, we use *Precision* and *Recall*. Precision
  measures exactness: of all instances the model predicted as positive, how many
  were actually positive?
  \$$ \text{Precision} = \frac{TP}{TP + FP} $$
  Recall measures completeness: of all the instances that were truly positive, how many did the model find?
  $$ \text{Recall} = \frac{TP}{TP + FN} $\$
  
  The *F1-score* combines these two into a single number by calculating their
  harmonic mean, providing a balanced measure that is useful when both precision
  and recall are important.
  \$$ F_1 = 2 \cdot \frac{\text{Precision} \cdot \text{Recall}}{\text{Precision} + \text{Recall}} = \frac{2TP}{2TP + FP + FN} $\$
  Together, these metrics provide a robust framework for comparing different
  sentiment analysis models.
  
  This fragment refers to Fig. 11.17. The figure in question is a "Diagram" and
  its description is as follows:
  
  A diagram of a 2x2 confusion matrix for a binary sentiment classification task
  (Positive/Negative). The axes would be 'Predicted Label' and 'True Label'. The
  four cells would be clearly labeled: True Positive (TP), False Positive (FP),
  True Negative (TN), and False Negative (FN). Below the matrix, the formulas for
  Accuracy, Precision, Recall, and F1-score would be written in terms of TP, FP,
  TN, and FN, directly linking the metrics to the visual representation.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
