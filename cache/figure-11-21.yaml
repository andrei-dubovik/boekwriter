prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Document-level sentiment analysis can be a blunt instrument, often failing to
  capture the full picture when a text contains mixed opinions. To illustrate the
  power and necessity of Aspect-Based Sentiment Analysis (ABSA), consider this
  common type of review:
  
  - "The pizza was delicious, but the service was slow."
  
  A document-level classifier might label this sentence as neutral, as the
  positive and negative sentiments could effectively cancel each other out. This
  overlooks crucial information. ABSA, in contrast, dissects the sentence to
  extract more granular insights. The goal is to identify the specific *aspects*
  being discussed and then determine the *polarity* of the opinion expressed
  towards each one.
  
  In this example, there are two distinct aspect-opinion pairs:
  
  1. **Aspect:** `pizza`
  
     - **Opinion Expression:** `delicious`
     - **Sentiment Polarity:** Positive (+)
  
  2. **Aspect:** `service`
  
     - **Opinion Expression:** `slow`
     - **Sentiment Polarity:** Negative (-)
  
  This process, visually deconstructed in Fig. 11.21, provides a much richer
  understanding of the reviewer's feedback. A restaurant owner reading this review
  learns precisely what customers liked (the food) and what needs improvement (the
  service). This level of detail is far more actionable than a simple "neutral"
  rating and demonstrates the core value of the ABSA task.
  
  This fragment refers to Fig. 11.21. The figure in question is a "Diagram" and
  its description is as follows:
  
  A diagram that visually deconstructs the sentence, "The pizza was delicious, but
  the service was slow." It would show the full sentence, then have two distinct
  branches. One branch would highlight the word 'pizza' (the aspect) and connect
  it with an arrow to the word 'delicious' (the opinion word), labeled with a '+'
  or 'Positive'. The second branch would highlight 'service' and connect it with
  an arrow to 'slow', labeled with a '-' or 'Negative'. This clearly illustrates
  the core task of ABSA.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
