prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To illustrate the practical power of ABSA, consider a large restaurant chain
  analyzing thousands of online customer reviews. A simple document-level analysis
  might reveal an average sentiment score of "mildly positive," but this provides
  no direction for improvement. By applying ABSA, the chain can dissect this
  feedback into more meaningful components.
  
  The system first extracts common aspects discussed by customers—such as *food
  quality*, *service speed*, *ambiance*, *price*, and *cleanliness*. For each
  mention of an aspect, it then classifies the associated sentiment. After
  aggregating the data across all reviews, a clear picture emerges. The analysis
  might reveal that while 'food quality' consistently receives high praise,
  'service speed' is a significant source of negative sentiment, a critical nuance
  that would otherwise be lost in an overall average score.
  
  This granular breakdown, visualized in **Fig. 11.24**, transforms vague feedback
  into actionable intelligence. The chart clearly highlights the restaurant's
  operational strengths and critical weaknesses at a glance. Armed with this
  specific insight, management can bypass generic improvement plans and focus
  resources precisely where they are needed—for instance, by retraining staff to
  improve service efficiency rather than needlessly altering a popular menu. ABSA
  thus provides a direct bridge from unstructured customer opinion to strategic
  business decisions.
  
  This fragment refers to Fig. 11.24. The figure in question is a "Chart" and its
  description is as follows:
  
  A horizontal bar chart summarizing the results of an Aspect-Based Sentiment
  Analysis on a large set of restaurant reviews. The Y-axis would list key aspects
  of the restaurant experience (e.g., 'Food Quality', 'Service Speed', 'Ambiance',
  'Price', 'Cleanliness'). The X-axis would represent the average sentiment score
  (e.g., from -1 to +1). Each bar would show the aggregated sentiment for its
  corresponding aspect, allowing for at-a-glance identification of strengths (long
  positive bars) and weaknesses (long negative bars).
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
