prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To make these distinctions concrete, consider a typical hotel review, which we
  can analyze at each of the three levels as illustrated in Fig. 11.5.
  
  > "The location was perfect, but the room was a bit noisy. Overall, a good
  > stay."
  
  The insights derived depend entirely on the chosen granularity:
  
  1. **Document-Level:** At the coarsest level, a model considers the entire text
     as a single document. Influenced by the phrase "a good stay," it would likely
     assign a single, overarching *Positive* polarity to the review. This gives a
     general summary but obscures important details.
  
  2. **Sentence-Level:** Here, the review is broken down into its constituent
     sentences or clauses. A system would classify "The location was perfect" as
     *Positive* and "the room was a bit noisy" as *Negative*. This reveals the
     conflicting opinions present within the same review.
  
  3. **Aspect-Based Level:** This most fine-grained analysis links sentiment
     directly to specific features, or *aspects*, of the hotel. The model
     identifies that the sentiment towards the aspect *'location'* is *Positive*
     ("perfect"), while the sentiment towards the aspect *'room'* is *Negative*
     ("noisy"). This level provides the most specific and actionable feedback.
  
  This fragment refers to Fig. 11.5. The figure in question is a "Diagram" and its
  description is as follows:
  
  A diagram illustrating the three levels of sentiment analysis using a single
  hotel review: "The location was perfect, but the room was a bit noisy. Overall,
  a good stay." The diagram would visually parse this review in three ways: (1)
  Document-level: A single 'Positive' label for the entire review. (2)
  Sentence-level: A 'Positive' label for the first sentence and a 'Negative' label
  for the second. (3) Aspect-based level: A 'Positive' sentiment linked to the
  aspect 'location' and a 'Negative' sentiment linked to the aspect 'room'.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
