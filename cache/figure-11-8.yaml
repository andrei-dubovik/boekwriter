prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  The fundamental algorithm for lexicon-based sentiment analysis is both intuitive
  and computationally efficient. It operates by aggregating the polarity of
  individual words to determine the overall sentiment of a text, a process
  summarized visually in Fig. 11.8. The procedure can be broken down into four
  main steps:
  
  1. **Tokenization:** First, the input text is segmented into a list of words, or
     tokens.
  2. **Polarity Scoring:** Each token is looked up in the sentiment lexicon. If
     the word is present, its pre-assigned polarity score is retrieved (e.g., +1
     for positive, -1 for negative). Words not found in the lexicon are typically
     assigned a neutral score of 0.
  3. **Aggregation:** The scores for all tokens in the text are combined, usually
     through simple summation, to produce a final sentiment score. This is
     calculated as: $S_{text} = \sum_{i=1}^{n} \text{polarity}(w_i)$ where $w_i$
     is the *i*-th word in the *n*-word text.
  4. **Classification:** The final aggregated score, $S_{text}$, is then compared
     against a threshold to assign a category. For instance:
     - **Positive** if $S_{text} > 0$
     - **Negative** if $S_{text} < 0$
     - **Neutral** if $S_{text} = 0$
  
  This method provides a transparent and easily implemented baseline for sentiment
  classification, serving as a valuable first approach before moving to more
  complex models.
  
  This fragment refers to Fig. 11.8. The figure in question is a "Diagram" and its
  description is as follows:
  
  A flowchart diagram that visually represents the steps of a simple lexicon-based
  sentiment analysis algorithm. It would start with an "Input Text" box, followed
  by arrows leading to subsequent steps: "Tokenize Text into Words", "For each
  word, look up polarity in Sentiment Lexicon (e.g., +1, -1, 0)", "Aggregate
  scores for all words (e.g., Summation)", and finally an "Output Sentiment Class
  (Positive/Negative/Neutral)" box based on the final score. This clarifies the
  process flow.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
