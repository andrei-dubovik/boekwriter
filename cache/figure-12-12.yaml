    Figure 12.12: The process of bias amplification in Large Language Models. Skewed
    training data, containing societal biases (e.g., gendered associations with
    professions), is ingested by the LLM. The model learns these statistical
    correlations and may amplify them, leading to highly stereotyped outputs even
    from neutral prompts. This creates a dangerous feedback loop where the model's
    biased generations can pollute future training datasets, further entrenching the
    bias.
