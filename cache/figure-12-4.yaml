prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  At the heart of the transformer's success is the *self-attention mechanism*, a
  novel component that allows a model to weigh the influence of different words
  when processing a particular word in a sequence. Unlike recurrent architectures
  like LSTMs, which process sentences sequentially and can lose information over
  long distances, self-attention allows every word to directly interact with every
  other word in the sentence. This direct access is crucial for capturing complex
  dependencies, such as resolving the referent of a pronoun or understanding the
  scope of negation, regardless of how far apart the words are.
  
  The mechanism operates on a simple but powerful principle, often described by an
  analogy to a library retrieval system. For each word in an input sequence, we
  create three distinct vectors: a **Query** (Q), a **Key** (K), and a **Value**
  (V).
  
  - The **Query** vector represents a word's request for information. It's like
    asking, "What other words in this sentence are relevant to my meaning?"
  - The **Key** vector acts as a label or an index for a word. It advertises its
    own properties, saying, "This is the kind of information I hold."
  - The **Value** vector contains the actual content or substance of a word. It's
    the information that will be passed on if a query finds its key relevant.
  
  These three vectors are not fixed; they are generated by multiplying a word's
  input embedding by three separate weight matrices ($W^Q$, $W^K$, $W^V$) that are
  learned during the model's training process. This allows the model to learn the
  most effective way to query, label, and represent each word for the task at
  hand.
  
  The self-attention process, depicted in *Fig. 12.4*, unfolds in three main
  steps. First, to determine how much attention the word at position *i* should
  pay to the word at position *j*, we compute a compatibility score. This is done
  by taking the dot product of the query vector of word *i* ($q_i$) with the key
  vector of word *j* ($k_j$). A higher score implies greater relevance.
  
  Second, these raw scores are scaled and normalized. The dot product scores are
  divided by the square root of the dimension of the key vectors, $\sqrt{d_k}$.
  This scaling factor prevents the dot products from growing too large, which
  helps stabilize the learning process. Afterwards, a softmax function is applied
  across all the scores for word *i*. This converts the scores into a set of
  positive weights that sum to one, effectively creating a probability
  distribution of attention over the entire sentence.
  
  $\text{AttentionWeights}_{ij} = \text{softmax}\left(\frac{q_i \cdot k_j^T}{\sqrt{d_k}}\right)$
  
  Finally, the new representation for word *i*, which we can call its context
  vector $z_i$, is computed as a weighted sum of all the *Value* vectors in the
  sentence. The weights used in this sum are precisely the attention weights
  calculated in the previous step.
  
  $z_i = \sum_{j} \text{AttentionWeights}_{ij} \cdot v_j$
  
  In essence, the final representation of each word is a blend of all other words'
  Value vectors, where the amount contributed by each word is determined by its
  query-key compatibility. This entire process is performed in parallel for every
  word in the sequence using highly optimized matrix operations, a key advantage
  over sequential models. The result is a set of output vectors, each one enriched
  with contextual information from the entire input, forming the foundation for
  the transformer's deep understanding of language.
  
  This fragment refers to Fig. 12.4. The figure in question is a "Diagram" and its
  description is as follows:
  
  A detailed diagram of the scaled dot-product self-attention mechanism. It will
  visually break down the process of creating Query (Q), Key (K), and Value (V)
  vectors from an input sequence, the matrix multiplications, the scaling
  operation, the softmax function, and the final weighted sum to produce the
  output context vector.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
