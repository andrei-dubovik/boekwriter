prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  While a single self-attention mechanism is powerful, it forces the model to
  average all types of linguistic relationships—syntactic, semantic, and
  anaphoric—into a single representation. This can create an informational
  bottleneck. To overcome this, the transformer architecture employs *multi-head
  attention*, which allows the model to jointly attend to information from
  different perspectives simultaneously.
  
  The core idea is to run the scaled dot-product attention mechanism multiple
  times in parallel. As illustrated in Fig. 12.6, rather than performing a single
  attention function on the model’s full-dimensional inputs, multi-head attention
  first linearly projects the queries, keys, and values *h* times using different,
  learned projection matrices. These projected versions are then fed into *h*
  separate attention "heads." Each head can focus on a different representation
  subspace, enabling one head to capture, for example, subject-verb agreement
  while another tracks semantic similarity between distant words.
  
  The outputs from each of the *h* heads are then concatenated and passed through
  one final linear projection to produce the layer's output. This process is
  formalized as:
  
  $\text{MultiHead}(Q, K, V) = \text{Concat}(\text{head}_1, \dots, \text{head}_h)W^O$
  
  where $\text{head}_i = \text{Attention}(QW_i^Q, KW_i^K, VW_i^V)$.
  
  The parameters to be learned are the projection matrices for each head
  ($W_i^Q, W_i^K, W_i^V$) and the final output projection matrix ($W^O$). This
  parallel structure provides a richer, more nuanced way for the model to process
  relationships within a sequence, significantly enhancing its expressive power.
  
  This fragment refers to Fig. 12.6. The figure in question is a "Diagram" and its
  description is as follows:
  
  A diagram that visually contrasts a single attention head with the multi-head
  attention mechanism. It will show how the model's input vectors are split and
  fed into multiple parallel attention 'heads', and how their individual outputs
  are concatenated and linearly transformed, clarifying how the model attends to
  information in different representation subspaces simultaneously.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
