prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Prior to the current era, the standard approach involved training a model *from
  scratch* for each new natural language processing task. A model intended for
  sentiment analysis, for instance, would be trained solely on a dataset of
  labeled reviews, learning about language only through that narrow lens. This
  process was not only computationally expensive but also required a large,
  task-specific labeled dataset for every problem, limiting the model's general
  linguistic competence. The arrival of the transformer architecture fundamentally
  changed this, introducing the more powerful and efficient paradigm of
  *pre-training and fine-tuning*.
  
  This new approach begins with **pre-training**, a computationally massive,
  one-time process. In this stage, a large transformer model is trained on a vast
  and diverse corpus of unlabeled text, such as the entirety of Wikipedia and
  large collections of books. The model is not trained to perform any specific
  user-facing task. Instead, it is given a general objective, such as predicting
  randomly masked words within a sentence (as in BERT) or predicting the next word
  in a sequence (as in GPT). By learning to perform this objective at a massive
  scale, the model is forced to develop a deep, contextualized understanding of
  language, internalizing grammar, syntax, semantic relationships, and a
  significant amount of world knowledge. This creates a versatile base model that
  serves as a powerful starting point for many different applications.
  
  The second stage, **fine-tuning**, adapts this general-purpose model to a
  specific *downstream task*. This involves taking the pre-trained model and
  training it further, but on a much smaller, task-specific labeled dataset. For
  example, to create a sentiment classifier, one would add a simple classification
  layer to the pre-trained model and continue training on a few thousand labeled
  movie reviews. Because the model has already learned the nuances of language
  during pre-training, it can learn the new task with far greater data efficiency
  and achieve a much higher level of performance than a model trained from
  scratch. This two-stage workflow, which separates the general language
  acquisition from the specific task adaptation, is visualized in **Fig. 12.8**.
  This paradigm has democratized access to state-of-the-art NLP, as developers can
  now leverage powerful, publicly available pre-trained models without incurring
  the immense cost of the initial pre-training phase.
  
  This fragment refers to Fig. 12.8. The figure in question is a "Diagram" and its
  description is as follows:
  
  A two-stage diagram illustrating the pre-training and fine-tuning paradigm. The
  'Pre-training' stage will depict a large, general-purpose model learning from a
  massive, unlabeled text corpus. The 'Fine-tuning' stage will show the same model
  being adapted with a smaller, task-specific labeled dataset (e.g., for sentiment
  analysis), clarifying this fundamental shift in model training.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
