prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  While a state diagram provides an intuitive picture of a finite automaton, a
  formal definition allows us to be precise. We will begin with the
  **Deterministic Finite Automaton (DFA)**, a type of FSA where every move is
  uniquely determined by the current state and the input symbol. There is no
  ambiguity; from any state, a given character leads to exactly one other state.
  
  Formally, a DFA is a 5-tuple $M = (Q, \Sigma, \delta, q_0, F)$ where:
  
  1. $Q$ is a finite set of states.
  2. $\Sigma$ is a finite set of input symbols, called the alphabet.
  3. $\delta$ is the transition function, which maps a state and an input symbol
     to a state. Its signature is $\delta: Q \times \Sigma \to Q$. This function
     is the "program" of the machine, dictating every possible move.
  4. $q_0 \in Q$ is the designated start state.
  5. $F \subseteq Q$ is the set of final or accepting states.
  
  Let's ground this formal definition using the state diagram shown in **Fig.
  2.10**, which depicts a DFA that recognizes the language of all strings ending
  in `ing`.
  
  The components of this specific automaton can be formally defined as follows:
  
  - **States ($Q$):** The circles in the diagram represent the states. We can name
    them $\{q_0, q_1, q_2, q_3\}$. Each state represents a stage in the
    recognition process, essentially remembering how much of the target suffix
    (`ing`) we have just seen. For instance, $q_0$ is the initial state, $q_1$ is
    the state after seeing an `i`, $q_2$ after seeing `in`, and $q_3$ after seeing
    `ing`.
  
  - **Alphabet ($\Sigma$):** This is the set of all characters the machine can
    process. For simplicity, let's assume it's the set of all lowercase English
    letters, $\{a, b, c, \dots, z\}$.
  
  - **Start State ($q_0$):** In the diagram, $q_0$ is marked as the start state by
    an incoming arrow that originates from no other state. This is where
    processing for any input string begins.
  
  - **Final States ($F$):** The set of final states is $\{q_3\}$. In diagrams,
    final states are indicated by a double circle. If the machine's final state
    after reading an entire input string is a member of $F$, the string is
    *accepted*.
  
  - **Transition Function ($\delta$):** The labeled arrows represent the
    transition function. For example, the arrow from $q_0$ to $q_1$ labeled `i`
    means that $\delta(q_0, i) = q_1$. The deterministic nature is clear: from
    $q_1$, an `n` must lead to $q_2$, while any other character (like `a` or `i`)
    might lead back to a different, specific state. For example, if the machine is
    in state $q_1$ (it has just seen an `i`) and the next character is another
    `i`, the machine would stay in state $q_1$, since this new `i` could be the
    start of a new `ing` sequence. This corresponds to a transition
    $\delta(q_1, i) = q_1$. In contrast, if it sees a `z`, the sequence is broken,
    so the transition might be $\delta(q_1, z) = q_0$. A complete DFA specifies a
    transition for every state and every symbol in the alphabet.
  
  This fragment refers to Fig. 2.10. The figure in question is a "Diagram" and its
  description is as follows:
  
  A state diagram of a simple Deterministic Finite Automaton (DFA). The diagram
  will show a machine recognizing strings ending in 'ing'. It will feature nodes
  for states (circles), a designated start state (incoming arrow), final states
  (double circles), and labeled directed edges for transitions.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
