prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  The equivalence between regular expressions and finite automata, established by
  Kleene's theorem, is not merely a theoretical curiosity. It provides a practical
  pathway for implementation: we can convert a regular expression, which is easy
  for humans to write, into an NFA, which is a straightforward computational
  model. Thompson's construction is a classic and elegant algorithm that
  accomplishes exactly this. The algorithm is recursive, meaning it defines how to
  build an NFA for a complex expression by first building NFAs for its simpler
  sub-expressions.
  
  The process starts with two base cases for the simplest possible regular
  expressions:
  
  - **A single symbol:** For a regular expression consisting of a single symbol
    `a` from the alphabet $\Sigma$, we construct an NFA with a new start state and
    a new final state, linked by a single transition labeled `a`.
  - **The empty string:** For the empty string, $\epsilon$, we construct an NFA
    with a new start and final state, linked by a single $\epsilon$-transition.
  
  From these atomic components, we build larger NFAs using rules that directly
  mirror the operators in the regular expression. Let's assume we have already
  constructed NFAs for the sub-expressions `s` and `t`, which we will call `N(s)`
  and `N(t)`.
  
  1. **Union (s|t):** To construct the NFA for the union `s|t`, we create a new
     start state and a new final state. We then add $\epsilon$-transitions from
     the new start state to the original start states of both `N(s)` and `N(t)`.
     We also add $\epsilon$-transitions from the original final states of `N(s)`
     and `N(t)` to our new final state. The original final states are no longer
     marked as final. This construction creates a machine that can
     non-deterministically choose to traverse either the path for `s` or the path
     for `t`.
  
  2. **Concatenation (st):** For the concatenation `st`, the start state of `N(s)`
     becomes the overall start state, and the final state of `N(t)` becomes the
     overall final state. We connect the two machines by adding an
     $\epsilon$-transition from the final state of `N(s)` to the start state of
     `N(t)`. The final state of `N(s)` is then unmarked. This forces the machine
     to complete the path for `s` before beginning the path for `t`.
  
  3. **Kleene Star (s\*):** To construct the NFA for `s*`, we again create a new
     start state and a new final state. We add an $\epsilon$-transition from the
     new start state directly to the new final state to handle the case of zero
     occurrences of `s`. We also add $\epsilon$-transitions from the new start
     state to the start state of `N(s)` and from the final state of `N(s)` to the
     new final state. Crucially, to allow for one or more repetitions, we add a
     "loop-back" $\epsilon$-transition from the final state of `N(s)` to its own
     start state.
  
  The power of this method lies in its compositionality. As illustrated in **Fig.
  2.14**, to build an NFA for a complex expression like `(a|b)*c`, we simply apply
  these rules recursively. We first construct the NFAs for `a` and `b`, combine
  them with the union rule to get `N(a|b)`, apply the Kleene star rule to this
  result to get `N((a|b)*)`, and finally use the concatenation rule to join it
  with `N(c)`. The resulting NFA has a predictable structure—always with a single
  start state and a single final state—making it a systematic and reliable method
  for converting any regular expression into a functionally equivalent NFA.
  
  This fragment refers to Fig. 2.14. The figure in question is a "Diagram" and its
  description is as follows:
  
  A multi-part diagram illustrating Thompson's construction algorithm. It will
  show the basic NFA building blocks for single symbols, and then demonstrate how
  they are recursively combined for concatenation, union, and Kleene star to build
  a complete NFA from a regular expression like `(a|b)*c`.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
