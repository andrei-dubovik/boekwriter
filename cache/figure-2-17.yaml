prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Let's consider a practical application of Finite-State Transducers: modeling
  English noun morphology. While FSAs can recognize valid words, FSTs can be used
  to transform them, making FSTs a natural fit for tasks like inflectional
  morphology, which involves changing a word's form to reflect grammatical
  features like number. The formation of noun plurals in English is a classic
  example that, while seemingly simple, is governed by a set of well-defined
  rules.
  
  Most nouns form their plural by simply adding an *-s* (e.g., *cat* → *cats*).
  However, nouns ending in sounds like /s/, /z/, or /ʃ/ (spelled with *s, z, x,
  sh, ch*) require an *-es* suffix (e.g., *fox* → *foxes*). We can capture this
  logic elegantly in an FST, as shown in Fig. 2.17. An FST for pluralization maps
  an input string (the singular noun) to an output string (the plural form).
  
  Consider the input word *cat*. The transducer would process this by following a
  path where each input character is mapped to itself as output. Upon reaching a
  final state after consuming the entire word, a final transition is taken that
  reads no input symbol ($\epsilon$) but outputs an *s*. The full transduction is
  thus `c:c`, `a:a`, `t:t`, `ε:s`, mapping the input *cat* to the output *cats*.
  
  Now, consider the input *fox*. The machine again maps `f:f` and `o:o`. However,
  upon reading the final *x*, the machine is designed to follow a different path.
  Instead of a simple `x:x` transition, it takes a specific transition labeled
  `x:es`. This single transition handles the morphological rule for this class of
  nouns, correctly producing the output *foxes*.
  
  This simple FST demonstrates the power of this formalism. It encodes multiple
  linguistic rules into a single, efficient computational model. Different paths
  through the machine correspond to different morphological processes. While a
  comprehensive FST for English morphology would be far more complex,
  incorporating rules for words ending in *-y* (*fly* → *flies*) and handling
  irregular forms (*mouse* → *mice*), this case study illustrates the fundamental
  utility of FSTs in computational morphology.
  
  This fragment refers to Fig. 2.17. The figure in question is a "Diagram" and its
  description is as follows:
  
  A state diagram of a Finite-State Transducer (FST) for English noun
  pluralization. The transitions will be labeled with input:output pairs (e.g.,
  `x:es`). The diagram will trace the paths for inputs like 'cat' and 'fox' to
  produce the outputs 'cats' and 'foxes'.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
