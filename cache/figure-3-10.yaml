prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  Everything you've done in this session—asking questions, creating a file, fixing
  a bug, running tests—lives in a single **conversation context**. Claude Code
  remembers each exchange, which is why later requests can build on earlier ones
  without repeating yourself. Ask it to "add error handling to the function we
  just wrote," and it knows exactly which function you mean.
  
  This memory lasts until you end the session. Once you close Claude Code, the
  context is gone; a new launch starts fresh.
  
  Look at **Fig. 3.10** for the loop you've been practicing all chapter:
  
  1. **Describe intent** — say what you want.
  2. **Review proposal** — read Claude Code's plan.
  3. **Approve action** — confirm or reject.
  4. **Verify result** — check what happened.
  
  Then repeat. Every subsequent chapter builds on this cycle.
  
  This fragment refers to Fig. 3.10. The figure in question is a "Diagram" and its
  description is as follows:
  
  A circular flow diagram depicting the core interactive loop that the reader has
  learned throughout the chapter. Four nodes are arranged in a cycle: (1)
  'Describe Intent' — you type a natural-language request; (2) 'Review Proposal' —
  Claude Code presents its plan, showing reasoning, tool calls, and proposed
  changes; (3) 'Approve Action' — you confirm or reject via the permission prompt;
  (4) 'Verify Result' — you inspect the output, the file on disk, or the test
  results. A bold arrow connects each node to the next in clockwise order, and a
  final arrow loops from 'Verify Result' back to 'Describe Intent', emphasizing
  the iterative nature of the workflow. A dashed branch from 'Approve Action'
  leads to a small 'Reject / Redirect' box that also feeds back to 'Describe
  Intent', showing the escape path discussed in section 9. Inside the center of
  the cycle, a label reads 'Conversation Context', with subtle lines connecting it
  to every node, reinforcing the idea from section 10 that accumulated session
  memory underpins each step. This single diagram serves as both a summary of the
  chapter and a quick-reference mental model the reader can carry forward into
  every subsequent chapter.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
