prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To make the concept of a balanced corpus concrete, we can examine one of the
  most influential early examples: the *Brown University Standard Corpus of
  Present-Day American English*, universally known as the Brown Corpus. Compiled
  in the 1960s by Henry Kučera and W. Nelson Francis at Brown University, it was a
  landmark achievement in linguistics. Its primary objective was to create a
  one-million-word sample of American English text that was broadly representative
  of the language as it was used in a single year, 1961. This made it the first
  truly balanced, computer-readable corpus of its kind, setting a standard for
  decades of future work in the field.
  
  The corpus consists of 500 text samples, or *documents*, each approximately
  2,000 words long. These samples were meticulously drawn from 15 distinct genre
  categories to ensure a wide-ranging representation of written English. As shown
  in **Fig. 3.4**, these categories span a diverse spectrum, including *Press:
  Reportage*, *Religion*, *Skills and Hobbies*, various genres of *Fiction*, and
  academic prose from the *Learned* and *Scientific* categories. The creators
  ensured that the number of samples from each category was proportional to its
  prevalence in the publishing world at the time, providing a snapshot of the
  literary landscape.
  
  This careful stratification is the essence of a balanced corpus. The goal is not
  merely to amass text, but to create a microcosm of the language as it is
  actually produced and consumed. By sampling from romance fiction as well as from
  government documents, the Brown Corpus allows researchers to make more
  generalizable claims about word frequencies, syntactic structures, and lexical
  patterns across the language as a whole, rather than just within a single,
  narrow domain. For instance, one could reliably compare the average sentence
  length in journalistic writing versus scientific prose using this data.
  
  Although a million words is considered small by today's standards—where corpora
  often contain billions of words—the methodological rigor of the Brown Corpus was
  revolutionary. It provided the empirical data for some of the first large-scale
  computational analyses of English vocabulary and grammar. Its design principles
  have been replicated and adapted for creating similar corpora in many other
  languages, a testament to its enduring influence. It demonstrated that a
  principled, data-driven approach was essential for the scientific study of
  language.
  
  This fragment refers to Fig. 3.4. The figure in question is a "Chart" and its
  description is as follows:
  
  A bar chart titled 'Composition of the Brown Corpus'. The chart will visually
  represent the distribution of the 15 text categories (e.g., Press: Reportage,
  Religion, Skills and Hobbies, Fiction: General). Each bar will be labeled with
  the category name and its size in words, illustrating the principle of a
  balanced, genre-diverse sample of a language.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
