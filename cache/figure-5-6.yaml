query: figure
prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  Let's make this concrete. Suppose you've cloned an Express.js app and want to
  understand its login flow. You might prompt:
  
  > Trace what happens when a POST request hits /login. Start from the route
  > definition and follow the request through middleware, service layer, and
  > database query. Explain what each layer does and what data it passes to the
  > next.
  
  Claude Code begins by grepping for `/login`, finding the route in
  `routes/auth.js`. It reads that file, discovers the handler delegates to
  `authController.login`, and follows the call. File by file, it narrates the
  chain: the controller validates input and calls `userService.authenticate`,
  which hashes the password and queries `models/User.js`, which runs the database
  lookup. On success, a JWT is minted and returned up through the layers.
  
  Fig. 5.6 illustrates this full journey, showing each application layer alongside
  the file Claude Code reads to uncover it and the data passed between them.
  
  This fragment refers to Fig. 5.6. The figure in question is a "Diagram" and its
  description is as follows:
  
  A vertical flowchart diagram tracing the path of a user login request through
  the application's layers, with two parallel tracks. The left track shows the
  application components in order from top to bottom: HTTP POST /login request
  arrives, Express route handler (routes/auth.js), authentication middleware
  (middleware/auth.js), user service layer (services/userService.js), database
  model and query (models/User.js), and then the return path back up carrying a
  session token in the HTTP response. The right track, connected to each
  corresponding layer by horizontal dashed arrows, shows the specific file that
  Claude Code reads at each stage and a brief annotation of what it discovers
  there (e.g., 'reads routes/auth.js — finds router.post("/login") calling
  authController.login'). Arrows between layers on the left track are labeled with
  what data is passed between them (e.g., 'email + password', 'user object', 'JWT
  token'). This diagram provides high information density by simultaneously
  illustrating the architectural layering of the application, the concrete data
  flowing between layers, and the investigative process Claude Code follows to
  uncover each link in the chain—three perspectives that would require extensive
  prose to convey in text alone.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
