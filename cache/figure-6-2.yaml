  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Once we accept the goal of revealing a sentence's grammatical structure, a
  fundamental question arises: what should that structure look like? In
  computational linguistics, two dominant paradigms have emerged to answer this
  question, each offering a different philosophical perspective on what
  constitutes syntax. These are *constituency parsing* and *dependency parsing*.
  
  Constituency parsing, also known as phrase-structure parsing, is built on the
  idea that sentences are composed of nested components called *constituents* or
  *phrases*. According to this view, words group together to form larger units,
  which in turn group together to form even larger ones, culminating in the
  complete sentence. The primary output of a constituency parser is a hierarchical
  tree that explicitly shows this grouping. For instance, the words 'the', 'old',
  and 'dog' combine to form a Noun Phrase (NP), and 'chased the cat' forms a Verb
  Phrase (VP). The NP and VP then combine to form the full sentence (S). This
  approach focuses on identifying the boundaries of these phrasal units and
  arranging them in a hierarchical structure.
  
  Dependency parsing, in contrast, models syntax as a set of relationships between
  individual words. The structure is not a hierarchy of phrases but a graph of
  dependencies. In this framework, every word in the sentence, except for one (the
  root, typically the main verb), is a *dependent* of another word, which is its
  *head*. These directed links, or *arcs*, are labeled with the specific
  grammatical function they represent, such as `nsubj` for a nominal subject or
  `dobj` for a direct object. This approach forgoes phrasal nodes entirely and
  instead focuses on representing how words modify or depend on each other,
  revealing the functional architecture of the sentence.
  
  The fundamental difference between these two formalisms is starkly illustrated
  in **Fig. 6.2**.
  
  ______________________________________________________________________
  
  **\[DIAGRAM: Fig. 6.2\]**
  
  *A side-by-side comparison diagram showing the same sentence, e.g., 'The old dog
  chased the cat', analyzed using both constituency and dependency parsing. The
  left side will show the hierarchical phrase structure tree (constituency), and
  the right side will show the dependency graph with directed, labeled arcs
  between words.*
  
  ______________________________________________________________________
  
  As the figure shows, the constituency tree for 'The old dog chased the cat'
  contains non-terminal nodes like `NP` and `VP` that are not words from the
  original sentence. It tells us that 'The old dog' is a single, cohesive unit.
  The dependency graph, on the other hand, consists only of the words themselves,
  connected by labeled arcs. It explicitly shows that 'dog' is the subject of
  'chased' and 'cat' is its object, while 'old' directly modifies 'dog'. In
  essence, constituency parsing asks, "What components make up this sentence?",
  while dependency parsing asks, "Which words depend on which other words, and
  how?". The remainder of this chapter will explore the formalisms and algorithms
  behind each of these powerful paradigms.
  
