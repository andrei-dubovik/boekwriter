  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To see how a CFG generates a sentence structure, let's parse the classic
  example: 'The cat sat on the mat'. We first need a grammar—a set of production
  rules—that can account for the structure of this specific sentence. Consider the
  following simple grammar, which we will call G1:
  
  - `S → NP VP` (A sentence is a Noun Phrase followed by a Verb Phrase)
  - `NP → Det N` (A Noun Phrase is a Determiner followed by a Noun)
  - `VP → V PP` (A Verb Phrase is a Verb followed by a Prepositional Phrase)
  - `PP → P NP` (A Prepositional Phrase is a Preposition followed by a Noun
    Phrase)
  - `Det → 'the'`
  - `N → 'cat' | 'mat'`
  - `V → 'sat'`
  - `P → 'on'`
  
  The first four are *phrasal rules* that define how non-terminals can be
  rewritten into other non-terminals. The last four are *lexical rules* which
  ground the grammar by connecting non-terminal symbols (parts of speech) to the
  actual words, or *terminals*, in our language.
  
  Using these rules, we can generate the sentence from the start symbol `S`
  through a sequence of substitutions called a **derivation**. In a *left-most
  derivation*, we always expand the left-most non-terminal at each step:
  
  01. `S`
  02. `⇒ NP VP` (by applying the rule `S → NP VP`)
  03. `⇒ Det N VP` (by applying `NP → Det N` to the left-most non-terminal, `NP`)
  04. `⇒ 'The' N VP`
  05. `⇒ 'The' 'cat' VP`
  06. `⇒ 'The' 'cat' V PP`
  07. `⇒ 'The' 'cat' 'sat' PP`
  08. `⇒ 'The' 'cat' 'sat' P NP`
  09. `⇒ 'The' 'cat' 'sat' 'on' NP`
  10. `⇒ 'The' 'cat' 'sat' 'on' Det N`
  11. `⇒ 'The' 'cat' 'sat' 'on' 'the' N`
  12. `⇒ 'The' 'cat' 'sat' 'on' 'the' 'mat'`
  
  This derivation confirms that the sentence is grammatical according to G1. More
  importantly, this process directly maps to a hierarchical structure. Each time a
  rule like `A → B C` is applied, we establish that `B` and `C` are the immediate
  constituents of `A`. The entire derivation can be visualized as a **phrase
  structure tree**, or parse tree, as shown in **Fig. 6.5**.
  
  The tree in **Fig. 6.5** provides an explicit, visual representation of the
  sentence's syntax. The root of the tree is the start symbol `S`. The internal
  nodes are the non-terminals (NP, VP, PP), and the leaves are the terminals—the
  words of the sentence. The diagram clearly shows that 'The cat' forms a Noun
  Phrase (the subject), while 'sat on the mat' forms a complete Verb Phrase (the
  predicate). Within that VP, the tree reveals further nested structure: 'on the
  mat' is its own constituent, a Prepositional Phrase. This ability to capture the
  nested, hierarchical grouping of words is the fundamental power of constituency
  grammars.
  
  This fragment refers to Fig. 6.5. The figure in question is a "Diagram" and its
  description is as follows:
  
  A classic phrase structure tree diagram for the sentence 'The cat sat on the
  mat'. The diagram will show the sentence at the bottom (terminals) and trace the
  hierarchical structure upwards through non-terminal nodes like NP, VP, and PP,
  culminating in the root S node, visually demonstrating the application of the
  CFG rules.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
