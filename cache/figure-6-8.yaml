prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  First-draft code from Claude Code is rarely the final draft—and that is
  perfectly fine. Iteration is the workflow, not a sign of failure.
  
  The refinement loop (Fig. 6.8) is simple:
  
  1. Describe what you want.
  2. Review the generated output.
  3. Identify *specific* gaps—a missing edge case, wrong return type, absent error
     handling.
  4. Ask for targeted fixes rather than regenerating from scratch.
  
  Targeted follow-up prompts work best: "Add input validation for empty lists,"
  "Switch the callback to `async/await`," or "The `total` field should be a
  decimal, not an integer." Each turn narrows the gap between what you have and
  what you need.
  
  Resist the urge to start over. Claude Code remembers the full conversation, so
  incremental corrections compound quickly—most code converges in two or three
  turns.
  
  This fragment refers to Fig. 6.8. The figure in question is a "Diagram" and its
  description is as follows:
  
  A cyclic flowchart illustrating the iterative refinement loop that is central to
  the section's message. The diagram begins with a node labeled 'Describe
  requirement to Claude Code' which flows to 'Review generated output'. From there
  an arrow leads to a diamond decision node labeled 'Meets expectations?'. A 'Yes'
  path exits the loop to a terminal node labeled 'Accept and commit code'. A 'No'
  path leads to a node labeled 'Identify specific issues (bugs, missing
  requirements, style problems)' which flows to 'Compose targeted follow-up
  prompt' which loops back to 'Review generated output'. Along each arrow in the
  'No' loop, small annotations give concrete examples of the kind of feedback a
  tinkerer might give at that stage—such as 'add input validation', 'switch to
  async/await', or 'handle the empty-list edge case'. A small counter notation on
  the loop ('Turn 2, Turn 3, …') reinforces the idea that multiple passes are
  normal. The diagram makes the chapter's key philosophical point visually
  unmistakable: the workflow is inherently cyclical and convergent, not a single
  shot, and each pass through the loop narrows the gap between the current output
  and the desired result.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
