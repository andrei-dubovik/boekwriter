query: figure
prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  Everything in this chapter distills into a single repeatable loop:
  
  1. **Describe the symptom** clearly—error message, wrong output, or slowdown.
  2. **Share context**: relevant files, logs, environment details.
  3. **Ask for hypotheses** before fixes. Two or three candidates beat a blind
     guess.
  4. **Investigate iteratively**—let Claude Code read code, run commands, and
     eliminate candidates one by one.
  5. **Verify every fix** by running the test that originally failed.
  6. **Commit the fix alongside a regression test** so the bug stays dead.
  
  Fig. 7.10 captures this workflow as a flowchart you can keep beside your
  terminal. Debugging with Claude Code is not a magic wand—it is a *structured
  collaboration*, and structure is what makes it reliable.
  
  This fragment refers to Fig. 7.10. The figure in question is a "Diagram" and its
  description is as follows:
  
  A flowchart depicting the complete systematic debugging methodology synthesized
  in this closing section. The diagram begins with a rounded box labeled 'Describe
  the Symptom' (containing sub-notes: error message, unexpected output,
  performance degradation), which flows downward via an arrow to 'Share Context'
  (relevant files, logs, environment details). From there an arrow leads to 'Ask
  for Hypotheses' (Claude Code proposes 2–3 candidate explanations). The flow then
  enters a dashed-border loop region labeled 'Iterative Investigation Cycle'.
  Inside the loop, the first box is 'Investigate Next Hypothesis' (read code, run
  commands, check logs), which flows to a diamond decision node asking 'Root Cause
  Found?'. A 'No' branch loops back up to 'Investigate Next Hypothesis' with a
  side note 'Eliminate and move to next candidate; if all exhausted, reset
  conversation with fresh context.' A 'Yes' branch exits downward to 'Propose and
  Apply Fix'. That flows to 'Verify with a Test' (run the failing test case,
  confirm it passes), which reaches a second diamond: 'Fix Verified?'. A 'No'
  branch loops back into the investigation cycle. A 'Yes' branch proceeds to the
  final box: 'Commit Fix + Regression Test'. The loop region and the two feedback
  arrows are the key visual elements, reinforcing that debugging is iterative, not
  linear. The diagram fits comfortably in a single column and serves as a tear-out
  reference checklist the reader can consult whenever they encounter a new bug.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
