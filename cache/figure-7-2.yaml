  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  To computationally model meaning, we must divide the problem into two
  interconnected challenges, which form the central theme of this chapter. The
  first is *lexical semantics*, which concerns the meaning of individual words or
  *lexemes*. This is the task of representing what words like *algorithm*,
  *analyze*, or *data* signify in isolation. It involves understanding
  relationships between words (e.g., that a *poodle* is a type of *dog*) and
  resolving ambiguity (e.g., distinguishing the river *bank* from the financial
  *bank*). Our initial focus will be on methods that capture these individual word
  meanings, treating them as the fundamental building blocks for any larger
  semantic analysis.
  
  The second, more complex challenge is *compositional semantics*. This area
  explores how the meanings of these building blocks combine, guided by syntax, to
  form the meanings of phrases and sentences. Knowing the definitions of "the,"
  "model," "predicts," and "outcome" is essential but insufficient. We must also
  have a computational mechanism to assemble them to understand the proposition
  conveyed by "The model predicts the outcome," and to recognize that it means
  something different from "The outcome predicts the model." The principle that
  the meaning of a complex expression is a function of the meanings of its parts
  and the rules used to combine them is the cornerstone of compositional
  semantics.
  
  This fundamental division is visualized in **Fig. 7.2**. On one side, we have
  lexical semantics, mapping individual words to their core concepts. On the
  other, compositional semantics takes these concepts and, guided by the
  sentence's grammatical structure, assembles them into a coherent representation
  of the full sentence's meaning. This chapter follows this natural progression:
  we will first master techniques for representing word meaning before turning to
  the methods used to combine them.
  
  This fragment refers to Fig. 7.2. The figure in question is a "Diagram" and its
  description is as follows:
  
  A two-panel diagram contrasting lexical and compositional semantics. The left
  panel, labeled 'Lexical Semantics,' will show individual words ('dog,' 'barks')
  pointing to their conceptual meanings. The right panel, 'Compositional
  Semantics,' will show how these individual meanings combine within a sentence
  structure ('The dog barks') to produce a complete sentence meaning.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
