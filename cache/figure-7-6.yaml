prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  While powerful, knowledge-based resources like WordNet have inherent
  limitations. They are expensive and time-consuming to create, may not cover all
  words or specialized domains, and struggle to adapt to the ever-evolving nature
  of language. To overcome these challenges, modern computational linguistics has
  largely shifted to data-driven methods for capturing meaning, all of which are
  built upon a foundational principle known as the **distributional hypothesis**.
  
  The core idea is captured perfectly by the linguist J.R. Firth's famous dictum:
  "You shall know a word by the company it keeps."[^1] This hypothesis posits that
  the meaning of a word is not an intrinsic property but is defined by the
  contexts in which it typically appears. Words that occur in similar contexts are
  assumed to have similar meanings. For example, consider the words *cat* and
  *dog*. Both frequently appear alongside words like *pet*, *food*, *walk*,
  *play*, and *vet*. This shared contextual environment suggests they occupy a
  similar semantic space—in this case, the category of common household pets. We
  don't need a manually curated dictionary to tell us they are related; the
  pattern of their usage in a large body of text reveals this relationship
  automatically.
  
  This principle is particularly powerful for handling polysemy, where a single
  word has multiple meanings. The surrounding words, or the *distribution*,
  provide the necessary clues to disambiguate the intended sense. As illustrated
  in Fig. 7.6, the word *bass* can refer to a type of fish or a musical
  instrument. If *bass* appears in a sentence with words like *fishing*, *river*,
  *lure*, and *caught*, its context clearly points to the aquatic meaning.
  Conversely, if it co-occurs with *music*, *guitar*, *treble*, and *band*, its
  meaning as a low-frequency instrument is activated. The context doesn't just
  suggest the meaning; in the distributional view, it *constitutes* the meaning.
  
  The profound implication of this hypothesis is that we can transform the
  abstract concept of meaning into something computationally tractable. If a
  word's meaning is the set of all its contexts, we can represent that meaning by
  aggregating those contexts statistically. This insight paves the way for
  representing words as numerical vectors, where each dimension corresponds to
  some aspect of their contextual environment. Instead of relying on a predefined
  graph of semantic relations, we can *learn* these relationships directly from
  raw, unstructured text, forming the basis for the vector space models we will
  explore next.
  
  This fragment refers to Fig. 7.6. The figure in question is a "Illustration" and
  its description is as follows:
  
  An illustration visually representing the distributional hypothesis. It will
  show a central target word, 'bass,' surrounded by two different contextual
  clouds of words. One cloud will contain words like 'fishing,' 'river,' 'lure,'
  indicating the fish meaning, while the other will contain words like 'music,'
  'guitar,' 'treble,' indicating the instrument meaning.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
  
  [^1]: Firth, J. R. (1957). *A synopsis of linguistic theory, 1930-1955*.
