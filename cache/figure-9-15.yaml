prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  The fixed-length context vector used in early encoder-decoder models, as we have
  seen, creates a significant *information bottleneck*. It forces the model to
  compress the entire meaning of a source sentence—regardless of its length or
  complexity—into a single vector of a few hundred dimensions. This is an immense
  burden. A long, nuanced sentence about political philosophy and a short, simple
  sentence like "The cat sat" must both be squeezed into the same fixed-size
  representation. Unsurprisingly, the performance of these models degrades sharply
  as sentence length increases, as information from early in the sentence is often
  lost by the time the vector is fully constructed.
  
  To overcome this critical limitation, a powerful and elegant solution was
  introduced: the **attention mechanism**. The central idea is intuitive yet
  revolutionary: instead of forcing the decoder to rely on a single, static
  context vector, we allow it to *attend* to different parts of the source
  sentence at each step of the decoding process. At the moment it generates the
  word "la", the French translation of "the", it might need to focus on the
  English word "The". When it later generates "souris", it should focus on
  "mouse". The attention mechanism gives the model a way to learn and implement
  this dynamic focus automatically.
  
  At its core, the attention mechanism provides the decoder with access to *all*
  of the encoder's hidden states ($h_1, h_2, ..., h_N$) at every decoding time
  step, $t$. Instead of using a pre-computed summary of the source, the decoder
  actively decides which encoder states are most relevant for predicting the
  current target word, $y_t$. It then computes a context-specific vector based on
  this decision. This process, visualized in **Fig. 9.15**, can be broken down
  into a few key steps.
  
  First, we need to score how well each encoder hidden state $h_j$ aligns with the
  decoder's hidden state from the *previous* time step, $s_{t-1}$. This score
  quantifies the relevance of the $j$-th source word to the $t$-th target word we
  are about to generate. This is accomplished using an *alignment score function*,
  which can be as simple as a dot product or a small feed-forward neural network
  that takes both states as input. We can represent this as:
  
  $e_{tj} = \text{score}(s_{t-1}, h_j)$
  
  This gives us a vector of scores, one for each source word position.
  
  Second, these raw alignment scores are normalized into a probability
  distribution using the softmax function. The resulting values, $\alpha_{tj}$,
  are called the *attention weights*. Each weight represents the amount of
  attention the decoder should place on the $j$-th source word when generating the
  $t$-th target word. Because they are the output of a softmax function, these
  weights conveniently sum to 1 over all source words.
  
  $\alpha_{tj} = \frac{\exp(e_{tj})}{\sum_{k=1}^{N} \exp(e_{tk})}$
  
  Third, a dynamic context vector, $c_t$, is computed as a weighted sum of all the
  encoder hidden states. The weights used in this sum are precisely the attention
  weights, $\alpha_{tj}$, we just calculated.
  
  $c_t = \sum_{j=1}^{N} \alpha_{tj} h_j$
  
  This context vector is a powerful construct. If a particular source word at
  position $j$ is deemed highly relevant for the current decoding step, its
  attention weight $\alpha_{tj}$ will be high, and its corresponding hidden state
  $h_j$ will dominate the context vector $c_t$. If another source word is
  irrelevant, its weight will be near zero, effectively silencing its
  contribution.
  
  Finally, this tailored context vector $c_t$ is combined with the decoder's
  current hidden state, typically by concatenation, and then used to predict the
  target word $y_t$. The entire mechanism, from scoring to prediction, is
  implemented with differentiable operations, meaning it can be trained end-to-end
  with backpropagation, just like the rest of the network.
  
  The introduction of attention was a watershed moment for NMT. By relieving the
  encoder of the impossible task of perfect compression, it dramatically improved
  translation quality, especially for long sentences. Furthermore, it offered a
  rare and valuable glimpse into the model's inner workings. By visualizing the
  attention weights $\alpha_{tj}$ as a matrix, we can see which source words the
  model "looked at" when generating each target word. This often reveals
  plausible, soft alignments between languages, making the model more
  interpretable and easier to debug. This ability to dynamically weigh input
  components proved so effective that it became the foundational concept for the
  next generation of neural architectures.
  
  This fragment refers to Fig. 9.15. The figure in question is a "Diagram" and its
  description is as follows:
  
  A diagram illustrating the attention mechanism. It will show the decoder at a
  specific timestep, generating one target word. Instead of using a single context
  vector, arrows will originate from the current decoder state and point to all of
  the encoder's hidden states. This visualizes the calculation of attention
  scores, which create a context-specific vector that allows the model to 'focus'
  on the most relevant input words for the current output word.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
