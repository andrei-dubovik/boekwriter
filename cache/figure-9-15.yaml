  caption:
    Fig. 9.15: The attention mechanism at a single decoder time step. The decoder's
    previous state, s(t-1), 'attends' to all encoder hidden states by calculating
    alignment scores. These scores are converted via softmax into attention weights
    (α), which determine each hidden state's contribution to the dynamic context
    vector c(t). The varied thickness of the purple arrows represents these weights,
    showing the model focusing heavily on the second hidden state. This context
    vector is then used with the decoder state to predict the next word, y(t).
