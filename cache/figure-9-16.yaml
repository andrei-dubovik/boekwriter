prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  The abstract concept of the attention mechanism becomes much clearer when
  visualized. At each step of generating a target word, the decoder calculates a
  set of *attention weights*, one for each word in the source sentence. These
  weights, which are positive and sum to one, determine the influence each source
  word has on the generation of the current target word. We can arrange these
  weights into a matrix, where rows correspond to the generated target words and
  columns correspond to the source words.
  
  **Fig. 9.16** presents a heatmap of such an attention matrix for a sample
  translation from French to English. The source sentence is laid out along the
  x-axis, and the generated target sentence is along the y-axis. The intensity of
  the color in each cell $(i, j)$ represents the attention weight $\alpha_{ij}$,
  which indicates how much the model focused on the *j*-th source word when
  producing the *i*-th target word. A brighter cell signifies a higher weight,
  meaning a stronger focus.
  
  Notice the strong diagonal pattern in the visualization. This is common for
  languages with similar word order, indicating that the model often aligns the
  *n*-th target word with the *n*-th source word. However, the true power of
  attention is revealed in the non-diagonal alignments, which show the model
  handling differences in grammar and word order. For instance, in translating the
  French phrase "la voiture verte" to the English "the green car", the model must
  reorder the adjective and noun. When generating the word "green", the attention
  mechanism would allow it to place a high weight on the source word "verte",
  regardless of their different positions in their respective sentences. This
  would be visible as a bright, off-diagonal cell in the matrix.
  
  This ability to dynamically link target words to relevant source words is
  precisely what overcomes the fixed-context-vector bottleneck of earlier models.
  Instead of relying on a single, compressed summary of the entire input, the
  decoder has direct, selective access to the source representation at every step.
  This not only dramatically improves translation quality but also offers a
  valuable form of *interpretability*. By visualizing attention, we gain a direct
  insight into the model's internal decision-making process, observing how it
  aligns words across languages to construct a coherent translation.
  
  This fragment refers to Fig. 9.16. The figure in question is a "Chart" and its
  description is as follows:
  
  A heatmap chart visualizing an attention matrix. The x-axis will list the words
  of a source sentence and the y-axis will list the words of the generated target
  sentence. Each cell in the grid will be colored based on the attention weight,
  with brighter colors indicating a higher weight. The chart will clearly show how
  the model aligns source and target words during translation, often forming a
  strong diagonal pattern.
  
  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the SVG
  figure. Verify that the labels do not obstruct one another.
