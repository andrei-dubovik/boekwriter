  In this chapter, we have laid the groundwork for our study of computational
  linguistics. We began by defining the field as the scientific endeavor to
  understand and model human language using computation, highlighting its unique
  position at the intersection of computer science, linguistics, and artificial
  intelligence. We distinguished this scientific goal from the engineering
