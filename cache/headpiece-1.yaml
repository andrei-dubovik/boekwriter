  learn relevant features automatically from raw data through a hierarchy of
  interconnected layers of "neurons."
  
  The first major success of this era was the development of dense word
  representations, known as *word embeddings*. Models like *Word2Vec* and *GloVe*
  learned to map words to low-dimensional vectors, where semantically similar
