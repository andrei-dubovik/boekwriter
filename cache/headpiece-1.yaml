  revolutionary departure from the sparse, high-dimensional vectors of the
  previous era. It allowed models to capture nuanced semantic relationships—for
  instance, learning a vector relationship such that
  $vector('king') -
  vector('man') + vector('woman') \approx vector('queen')$. This
  ability to represent meaning numerically became a cornerstone of modern NLP.
  
  Following this, architectures specifically designed for sequential data, such as
  *Recurrent Neural Networks* (RNNs) and their more robust variants like Long
  Short-Term Memory (LSTM) networks, became dominant. These models process text
  one word at a time, maintaining an internal state or "memory" that allows them
  to capture sequential dependencies, making them highly effective for tasks like
  language modeling and machine translation.
  
  However, the most significant breakthrough of the deep learning era has been the
  *Transformer* architecture, introduced in 2017. Its core innovation, the
  *self-attention mechanism*, allows a model to weigh the influence of all words
  in an input sentence when processing any single word. This enables it to capture
  complex, long-range dependencies far more effectively than RNNs and, crucially,
  allows for massive parallelization during training. This architecture is the
