  To appreciate the complexity that computational linguistics addresses, consider
  a seemingly simple sentence:
  
  *I saw a man on a hill with a telescope.*
  
  For a human, understanding this sentence feels effortless. We might briefly
  register a slight ambiguity, but context or common sense usually guides us to a
  single, intended meaning. For a computer, however, this sentence presents a
  significant challenge. The string of words is grammatically correct, yet it
  allows for at least two distinct interpretations based on its underlying
  structure:
  
  1. There is a man on a hill, and I used a telescope to see him. In this case,
     the telescope is the instrument of the action 'saw'.
  2. There is a man on a hill, and that hill also has a telescope on it. In this
     case, the telescope is part of the description of the hill.
  
  This is a classic example of *structural ambiguity*, also known as syntactic
  ambiguity. The uncertainty doesn't come from the words themselves but from how
  they can be grammatically combined. The source of the confusion is the
  prepositional phrase *with a telescope*. What does it modify? Does it attach to
  the verb phrase (*saw...with a telescope*) or the noun phrase (*a hill with a
  telescope*)?
  
  This ambiguity is visually represented in the two syntactic parse trees shown in
  Fig. 1.3. In one tree, the phrase *with a telescope* attaches to the verb phrase
  headed by *saw*, modifying the act of seeing. In the other, it attaches to the
  noun phrase *a hill*, modifying the location. Both are perfectly valid
  grammatical structures. A computational system, however, has no innate
  understanding of the world to help it decide. It cannot know if the speaker is
  an astronomer or is describing a landmark. Without a mechanism to resolve this
  ambiguity, a system cannot reliably answer questions like "What did you use to
  see the man?" or "What was on the hill?"
  
  Resolving this kind of ambiguity is a central task in computational linguistics.
  It requires a powerful combination of disciplines. From *linguistics*, we borrow
  the formalisms of syntax that allow us to identify and represent these different
  possible structures. From *computer science* and *artificial intelligence*, we
  leverage algorithms to parse the sentence and statistical models to determine
  which structure is more probable. For instance, a model trained on a vast amount
  of text might learn that the verb 'saw' is far more frequently modified by the
  instrument 'with a telescope' than the noun 'hill' is. This single, illustrative
  sentence thus encapsulates the core challenge of the field: to make the
  implicit, probabilistic reasoning that humans perform so easily explicit and
  computable.
  
  As you navigate the field, you will frequently encounter two terms:
  *Computational Linguistics* (CL) and *Natural Language Processing* (NLP). While
  often used interchangeably, especially in industry, they represent a subtle but
  important distinction in focus, best understood through the lens of science
  versus engineering.
  
  *Computational Linguistics* is fundamentally a *scientific* discipline. Its
  primary goal is to understand the nature of human language itself, using
  computational models as its primary theoretical and experimental tool. A
  computational linguist asks questions like: What formal mechanisms can explain
  how humans resolve ambiguity? Can we create a model of syntax that aligns with
  psycholinguistic evidence of human sentence processing? The ultimate aim is to
  gain deeper insight into language and the human mind.
  
  *Natural Language Processing*, on the other hand, is an *engineering*
  discipline. It is a subfield of artificial intelligence and computer science
  focused on building systems that can perform useful tasks involving language. An
  NLP engineer asks questions like: What is the most accurate and efficient
  algorithm for translating Spanish to Japanese? How can we build a chatbot that
  reliably answers customer questions? The success of an NLP system is measured by
  its performance, robustness, and utility in a real-world application.
  
  Think of the relationship between physics and mechanical engineering. A
  physicist studies the laws of motion and thermodynamics to understand the
  universe. An engineer uses those laws to build a more efficient engine. The two
  are deeply intertwined and mutually beneficial. In the same way, CL and NLP
  exist in a symbiotic relationship:
  
  - Scientific insights from **CL** about the structure of language often lead to
    new techniques and better-performing models in **NLP**.
  - The practical challenges and empirical results from building **NLP** systems
    often challenge existing theories and drive new research questions in **CL**.
  
  In this book, we will explore both facets. We will delve into the linguistic
  theories and formal models that form the scientific core of the field, while
  also grounding our discussion in the practical algorithms and applications that
  define modern NLP.
  
  The history of computational linguistics is not one of steady, linear progress
  but is better understood as a series of major paradigm shifts, each driven by
  new theoretical insights and advancements in computing power. As summarized in
  the timeline in Fig. 1.5, we can broadly identify three distinct eras that have
  shaped the field.
  
  The journey began in the 1950s, alongside the dawn of artificial intelligence
  itself. This first phase, often called the *symbolic* or *rule-based era*, was
  characterized by attempts to explicitly encode linguistic knowledge. Researchers
  believed that by writing down a sufficient number of grammatical rules and
  dictionary entries, they could enable machines to understand and translate
  language. This approach dominated the field for several decades but often
  struggled with the vast complexity and ambiguity inherent in human language.
  
  The late 1980s and 1990s witnessed the *statistical revolution*. This marked a
  profound shift away from handcrafted rules and towards learning probabilistic
  patterns directly from large digital text collections known as corpora. Finally,
  the 2010s ushered in the current *deep learning era*, where neural networks have
  redefined the state of the art, enabling unprecedented performance on a wide
  array of language tasks.
  
  The early history of computational linguistics, from the 1950s through the
  1980s, was defined by a *symbolic* or *rule-based* paradigm. The guiding
  philosophy was one of rationalism: human language was seen as a formal system
  that could be fully described by a set of explicit rules and structures. The
  task, then, was for linguists to meticulously codify this knowledge—the rules of
  grammar, syntax, and morphology—and for computer scientists to implement these
  rules in programs. This approach envisioned the computer not as a learner, but
  as a logician, mechanically applying human-created linguistic rules to process
  text.
  
  The most prominent and publicized example of this era was the Georgetown-IBM
  machine translation experiment in 1954. This demonstration, designed to showcase
  the potential of automated translation, successfully translated over sixty
  carefully selected Russian sentences into English. The system was rudimentary by
  modern standards, relying on a small vocabulary of 250 words and just six
  handcrafted grammatical rules. A Russian word would be looked up in a bilingual
  dictionary, and its English equivalent would be output, with the rules handling
  basic word reordering and inflectional changes. For instance, a rule might
  specify how to handle a Russian noun's case ending to produce a correct English
  prepositional phrase.
  
  The demonstration was a resounding success in the public eye, creating a wave of
  optimism and securing substantial government funding for the nascent field. The
  press confidently predicted that automated interpreters would be commonplace
  within a few years. However, this initial success on a small, controlled problem
  masked a fundamental weakness. The rule-based approach failed to scale. The
  number of rules required to cover the vast complexity, ambiguity, and exceptions
  of a real language grew astronomically. As more rules were added, they would
  often conflict, leading to a cascade of errors. This "combinatorial explosion"
  proved that hand-crafting a comprehensive grammar for a language was an
  intractable task, setting the stage for a major paradigm shift.
  
  By the late 1980s, the limitations of purely symbolic, rule-based systems were
  becoming clear. Hand-crafting comprehensive grammars and lexicons proved to be a
  monumental task; for every rule a linguist could devise, real-world language
  presented countless exceptions. These systems were notoriously *brittle*: an
  unfamiliar word or a slightly unconventional grammatical construction could
  cause them to fail completely. Furthermore, they were difficult to scale or
  adapt to new domains, as each new application required another intensive, manual
  effort of rule creation.
  
  This led to a major paradigm shift, often called the *statistical revolution*.
  The central idea was to move away from hand-crafted rules and towards models
  that learn patterns automatically from data. Instead of relying on a linguist's
  intuition, the field embraced probability theory and machine learning. The
  fundamental question changed from "Is this sentence grammatically correct
  according to my rules?" to "What is the most *probable* interpretation of this
  sentence given the evidence we have seen?"
  
  This new empirical approach was fueled by two parallel developments: the
  exponential growth in computing power, which made it feasible to process huge
  datasets, and the increasing availability of large-scale digital text
  collections, known as *corpora*. Researchers could now train statistical models
  on millions or even billions of words of authentic text, allowing the models to
  learn the likelihood of different linguistic phenomena. Tasks were reframed as
  problems of statistical inference. For example, machine translation was no
  longer about applying transfer rules, but about finding the target sentence *T*
  that maximizes the probability $P(T|S)$ given a source sentence *S*. Using
  Bayes' theorem, this can be expressed as finding the *T* that maximizes the
  product of two probabilities:
  
  $P(S|T) \times P(T)$
  
  This elegantly separates the problem into a *translation model* (the probability
  of the source given the target) and a *language model* (the a priori probability
  of the target sentence). This probabilistic mindset, pioneered in speech
  recognition and machine translation, made systems more robust and adaptable,
  laying the essential groundwork for the data-driven methods that define
  computational linguistics today.
  
  Beginning in the early 2010s, the field underwent its most dramatic
  transformation to date, ushering in the current era of *deep learning*. This
  paradigm shift was fueled by the convergence of three key factors: the
  availability of massive datasets, significant advancements in parallel computing
  hardware like Graphics Processing Units (GPUs), and breakthroughs in neural
  network architectures. Unlike the statistical methods that relied on carefully
