  A minimalist, clean-line illustration of a watchmaker at a workbench. The
  watchmaker is hunched over, using delicate tweezers to work on a single,
  intricate assembly of gears. The vast majority of the watch's other components
  are not on the main workspace; instead, they are neatly organized in small,
  compartmentalized trays set off to the side. The central theme is focus: the
  workspace is uncluttered, containing only the specific tools and parts needed
  for the immediate task, while the complexity of the whole project is kept
  organized but out of the way.
