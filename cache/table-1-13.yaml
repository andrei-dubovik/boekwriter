prompt:
  Consider the following text fragment from a book called "Introduction to
  Computational Linguistics".
  
  Beyond the prominent examples of machine translation, search, and virtual
  assistants, the techniques of computational linguistics power a vast ecosystem
  of applications. These tools are often seamlessly integrated into the software
  we use daily, working behind the scenes to structure data, understand opinions,
  and facilitate communication. The following examples represent just a sample of
  this diverse and impactful landscape.
  
  - **Sentiment Analysis and Opinion Mining:** This field focuses on automatically
    identifying and categorizing opinions expressed in text. The primary goal is
    often to determine the author's attitude—*positive*, *negative*, or
    *neutral*—towards a particular topic, product, or service. Businesses use this
    technology extensively to analyze customer feedback, monitor brand perception
    on social media, and gauge public response to marketing campaigns.
  
  - **Information Extraction (IE):** While search engines retrieve relevant
    documents, information extraction systems go a step further by pulling
    structured data from unstructured text. A key subtask is *Named Entity
    Recognition (NER)*, which identifies and classifies entities like people
    (e.g., "Ada Lovelace"), organizations ("Google"), and locations ("Paris").
    Another is *Relation Extraction*, which seeks to discover the relationships
    between these entities, such as identifying who works for which company from a
    collection of news articles.
  
  - **Text Summarization:** With the overwhelming volume of online text, automatic
    summarization is an invaluable tool. The objective is to produce a concise and
    fluent summary of a longer document while retaining its most important
    information. This technology is used to generate news headlines on aggregator
    sites, create abstracts for scientific papers, and condense long reports into
    manageable digests for busy executives.
  
  - **Dialogue Systems and Chatbots:** While related to the virtual assistants
    discussed earlier, this broad category also includes more focused
    conversational agents. Task-oriented chatbots guide users through specific
    processes like booking a flight or providing automated customer support,
    freeing up human agents for more complex issues.
  
  These applications, along with others like grammar correction and plagiarism
  detection, demonstrate the broad utility of the field. Each one relies on a
  combination of the core linguistic and computational concepts we will explore
  throughout this book. A more detailed summary of these and other modern
  applications, outlining their primary goals and providing concrete examples, is
  presented in Fig. 1.13.
  
  This fragment refers to Fig. 1.13, which is a table. Its description is as
  follows:
  
  A table summarizing a range of modern computational linguistics applications.
  Columns will detail the 'Application' (e.g., Sentiment Analysis, Named Entity
  Recognition), its 'Goal', and a concrete 'Example' (e.g., 'Classify product
  reviews as positive/negative', 'Identify people and organizations in a news
  article').
  
  Draft this table, format it using LaTeX. Assume the `booktabs` package is
  already imported. Only include the `tabular` environment and its content in the
  output, exclude the outer `table` environment.
