response:
  caption: Essential Keyboard Shortcuts and Command-Line Flags
  latex:
    \begin{tabular}{@{}p{4.2cm}p{10.3cm}@{}}
    \toprule
    \textbf{Shortcut / Flag} & \textbf{What It Does} \\
    \midrule
    \multicolumn{2}{@{}l}{\textit{Launch \& Input Flags}} \\
    \addlinespace[3pt]
    \texttt{-{}-model <model>} & Override the default model for this session. Reach for this when a task demands a specific model variant. \\
    \addlinespace
    \texttt{echo "..." | claude} & Pipe input directly to Claude Code, enabling use inside shell scripts and automation chains without starting an interactive session. \\
    \addlinespace
    \texttt{claude -p "..."} & Print mode. Sends a single prompt, prints the response to \texttt{stdout}, and exits---ideal for quick one-off questions. \\
    \addlinespace
    \texttt{-{}-output-format json} & Emit the response as structured JSON. Combine with \texttt{-p} for programmatic consumption in pipelines. \\
    \addlinespace
    \texttt{-{}-output-format stream-json} & Stream the response as incremental JSON chunks, enabling real-time processing in automation workflows. \\
    \midrule
    \multicolumn{2}{@{}l}{\textit{In-Session Controls}} \\
    \addlinespace[3pt]
    \texttt{Ctrl+C} & Interrupt Claude mid-response or cancel a pending tool execution. Invaluable when output is heading in the wrong direction and you want to course-correct immediately. Note: during tool execution this aborts the tool rather than the whole response. \\
    \addlinespace
    \texttt{Escape} & Cancel the current input line without sending it. Does not interrupt an in-progress response from Claude. \\
    \addlinespace
    \texttt{/compact} & Compress conversation context to reclaim token headroom while preserving essential details of the session so far. \\
    \addlinespace
    \texttt{/verbose} & Toggle verbose output for tool executions, showing or hiding detailed logs of each tool call and its result. \\
    \addlinespace
    \texttt{/model <model>} & Switch to a different model mid-session without restarting the conversation or losing context. \\
    \midrule
    \multicolumn{2}{@{}l}{\textit{Session Management}} \\
    \addlinespace[3pt]
    \texttt{-{}-resume} & Resume the most recent conversation, restoring full context from the prior session. \\
    \addlinespace
    \texttt{-{}-resume <session-id>} & Resume a specific prior conversation by its unique session identifier. \\
    \addlinespace
    \texttt{/clear} & Clear the current context window entirely, starting fresh within the same session. Useful when accumulated context becomes noisy or irrelevant. \\
    \bottomrule
    \end{tabular}
