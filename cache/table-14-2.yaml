prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  The shortcuts and flags in Fig. 14.2 are worth committing to muscle memory. A
  few deserve special emphasis. Piping input with
  `echo "explain this error" | claude` lets you integrate Claude Code into shell
  scripts and automation chains without entering an interactive session. The `-p`
  (print mode) flag is its close cousin: it sends a single prompt, prints the
  response to stdout, and exits—perfect for quick one-off questions. Inside a
  session, `Escape` cancels your current input line while `Ctrl+C` interrupts
  Claude Code mid-response, which is invaluable when you see it heading in the
  wrong direction and want to course-correct immediately rather than wait.
  
  This fragment refers to Fig. 14.2, which is a table. Its description is as
  follows:
  
  A two-column reference table titled 'Essential Keyboard Shortcuts and
  Command-Line Flags' that serves as a quick-lookup card. The left column is
  labeled 'Shortcut / Flag' and contains the exact keystrokes or CLI syntax (e.g.,
  '--model <model-name>', 'echo "..." | claude', 'claude -p "..."', '--resume',
  'Ctrl+C', 'Escape', '/compact'). The right column is labeled 'What It Does' and
  provides a concise one-to-two sentence explanation of the behavior, when you
  would reach for it, and any important caveats (such as the difference between
  interrupting a response mid-stream versus cancelling a tool execution). Rows are
  grouped into three logical sections separated by thin horizontal rules: 'Launch
  & Input Flags' (model override, piped input, print mode, output format flags),
  'In-Session Controls' (interrupt, resume, toggle tool output verbosity, slash
  commands), and 'Session Management' (resume previous conversation, compact flag,
  clear context). The table is designed to fit comfortably on a single portrait A4
  page with roughly 12–15 rows, making it dense enough to be genuinely useful as a
  tear-out reference sheet while remaining scannable at a glance. This is the
  single highest-value visual aid in the chapter because it directly supports the
  stated goal of being a resource readers return to repeatedly, and tabular format
  is dramatically more scannable than the same information buried in prose
  paragraphs.
  
  Draft this table, format it using LaTeX. Assume the `booktabs` package is
  already imported. Only include the `tabular` environment and its content in the
  output, exclude the outer `table` environment.
