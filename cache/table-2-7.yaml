  caption: Fig. 2.7 – Installation troubleshooting reference table
  latex:
    \begin{tabular}{p{3.4cm} p{3.2cm} p{4.6cm} p{2.4cm}}
    \toprule
    \textbf{Symptom} & \textbf{Likely Cause} & \textbf{Fix} & \textbf{OS} \\
    \midrule
    \texttt{EACCES: permission denied} during global \texttt{npm install} &
    npm's default global directory is owned by root &
    Switch to \texttt{nvm} to manage Node.js; it installs packages in your home directory, eliminating the ownership conflict. &
    macOS / Linux \\
    \addlinespace
    Engine compatibility error: Node.js version is too old &
    The system-shipped Node.js falls below Claude Code's minimum required version &
    Install a current LTS release via \texttt{nvm}:\newline \texttt{nvm install --lts}\newline \texttt{nvm use --lts} &
    macOS / Linux / Windows WSL \\
    \addlinespace
    \texttt{claude: command not found} after a successful install &
    The npm global \texttt{bin} directory is not on your \texttt{PATH} &
    Add the directory to your shell profile:\newline \texttt{export PATH=\"\$(npm prefix -g)/bin:\$PATH\"} \newline Append this line to \texttt{\textasciitilde/.bashrc}, \texttt{\textasciitilde/.zshrc}, or the equivalent, then reload the shell. &
    macOS / Linux / Windows WSL \\
    \addlinespace
    \texttt{ETIMEDOUT} or \texttt{ECONNREFUSED} during install &
    A corporate proxy or firewall is blocking access to the npm registry &
    Configure npm's proxy settings:\newline \texttt{npm config set proxy http://proxy:port}\newline \texttt{npm config set https-proxy http://proxy:port}\newline Or point to an internal registry mirror:\newline \texttt{npm config set registry https://internal.registry} &
    macOS / Linux / Windows WSL \\
    \addlinespace
    \texttt{UNABLE\_TO\_GET\_ISSUER\_CERT\_LOCALLY} (SSL certificate error) &
    Corporate TLS inspection is replacing upstream certificates with its own &
    Set the \texttt{NODE\_EXTRA\_CA\_CERTS} environment variable to point to your corporate CA bundle:\newline \texttt{export NODE\_EXTRA\_CA\_CERTS=/path/to/ca-bundle.crt} &
    macOS / Linux / Windows WSL \\
    \addlinespace
    \texttt{SyntaxError: Unexpected token} on launch &
    Claude Code is running under an unsupported older Node.js version that lacks required JavaScript features &
    Upgrade Node.js to the minimum supported version:\newline \texttt{nvm install --lts}\newline \texttt{nvm use --lts}\newline Verify with \texttt{node -v}. &
    macOS / Linux / Windows WSL \\
    \bottomrule
    \end{tabular}
