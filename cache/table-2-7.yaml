  latex: \begin{tabular}{lll}\toprule\textbf{Syntax} & \textbf{Description} & \textbf{Example} \\\midrule\multicolumn{3}{l}{\textit{Character Classes}} \\\texttt{[abc]} & Match any character from the set. & \texttt{[aeiou]} matches 'a' in 'cat'. \\\texttt{[\^{}abc]} & Match any character not in the set. & \texttt{[\^{}0-9]} matches 'a' in 'a1'. \\\texttt{[a-z]} & Match any character in the range. & \texttt{[a-z]} matches 'c' in 'cat'. \\\texttt{\textbackslash d} & Match any digit character. & \texttt{\textbackslash d} matches '5' in 'file\_5'. \\\texttt{\textbackslash w} & Match any word character (alphanumeric or \_). & \texttt{\textbackslash w} matches '\_' in 'a\_b'. \\\texttt{\textbackslash s} & Match any whitespace character. & \texttt{\textbackslash s} matches the space in 'a b'. \\\midrule\multicolumn{3}{l}{\textit{Quantifiers}} \\\texttt{*} & Match preceding element 0 or more times. & \texttt{ab*c} matches 'ac' and 'abc'. \\\texttt{+} & Match preceding element 1 or more times. & \texttt{ab+c} matches 'abc' and 'abbc'. \\\texttt{?} & Match preceding element 0 or 1 time. & \texttt{colou?r} matches 'color'. \\\texttt{\{n\}} & Match preceding element exactly n times. & \texttt{\textbackslash d\{3\}} matches '123'. \\\texttt{\{n,m\}} & Match preceding element from n to m times. & \texttt{\textbackslash d\{2,4\}} matches '99' and '1234'. \\\midrule\multicolumn{3}{l}{\textit{Anchors}} \\\texttt{\^{}} & Anchor match to the start of the string/line. & \texttt{\^{}cat} matches 'cat' in 'catdog'. \\\texttt{\$} & Anchor match to the end of the string/line. & \texttt{cat\$} matches 'cat' in 'tomcat'. \\\texttt{\textbackslash b} & Match a word boundary position. & \texttt{\textbackslash bcat\textbackslash b} matches 'cat', not in 'caterpillar'. \\\midrule\multicolumn{3}{l}{\textit{Capturing Groups}} \\\texttt{(...)} & Group pattern and capture the matched string. & \texttt{(US|EU)} captures 'US' from 'Order: US 543'. \\\bottomrule\end{tabular}
