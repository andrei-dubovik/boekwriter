    UX Requirements & None specified & Inline errors requested but no component or placement details given & Inline errors below each field rendered via \texttt{FormError} \\
    \addlinespace
    Resulting Output & Generic validation with arbitrary rules; may create new components or modify unrelated files & Focused on email and password in the correct file; specific rules and error display still guessed & Precise validation matching all stated rules; errors rendered with \texttt{FormError}; \texttt{api/auth.ts} untouched \\
    \addlinespace
    Follow-up Effort & High --- multiple rounds of correction needed to align output with intent & Moderate --- some refinement of rules and error display required & Minimal --- output matches intent with little to no revision \\
