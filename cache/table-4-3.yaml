prompt:
  Consider the following text fragment from a book called "A Tinkerer's
  Introduction to Claude Code".
  
  To see these principles in action, consider three ways to ask Claude Code for
  the same thing: adding input validation to a signup form.
  
  - **Vague:** *"Add validation to the signup form."*
  - **Moderate:** *"Add email and password validation to the signup form in
    `SignupForm.tsx`, showing inline errors."*
  - **Richly specific:** *"Add validation to `SignupForm.tsx`: email must match a
    standard regex, password must be at least 12 characters with one symbol,
    username must be 3–20 alphanumeric characters. Display inline error messages
    below each field using our existing `FormError` component. Don't modify
    `api/auth.ts`."*
  
  The vague prompt gives Claude Code almost nothing to work with; the moderate one
  narrows the target; the richly specific one eliminates guesswork almost
  entirely. Fig. 4.3 breaks this comparison down dimension by dimension—prompt
  text, validation rules, error handling, file scoping, UX requirements, resulting
  output, and follow-up effort needed. Study it carefully; the pattern it reveals
  applies to every prompt you will ever write.
  
  This fragment refers to Fig. 4.3, which is a table. Its description is as
  follows:
  
  A three-column comparison table where each column represents one version of the
  signup-form validation prompt (Vague, Moderate, Richly Specific). The rows break
  down key dimensions: the exact prompt text given to Claude Code, the specificity
  of the desired validation rules (e.g., none stated vs. 'email and password' vs.
  'email regex, password minimum 12 chars with one symbol, username 3–20
  alphanumeric'), whether error-handling behavior is mentioned, whether target
  files or frameworks are named, whether UX requirements like inline error
  messages are specified, a brief summary of what Claude Code actually produces in
  response, and a qualitative assessment of how much follow-up correction the user
  needed. This table makes the cause-and-effect relationship between prompt detail
  and output quality immediately scannable, letting the reader see at a glance
  exactly which missing details in the vague prompt led to unwanted guesses, which
  additions in the moderate prompt narrowed the output, and how the richly
  specific prompt eliminated almost all ambiguity. It serves as the chapter's
  single most referenceable artifact—a concrete, side-by-side proof of the three
  core principles (specificity, context, constraints) introduced in the preceding
  section.
  
  Draft this table, format it using LaTeX. Assume the `booktabs` package is
  already imported. Only include the `tabular` environment and its content in the
  output, exclude the outer `table` environment.
