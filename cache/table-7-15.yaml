response:
  caption:
    Fig. 7.15: A summary of fundamental semantic roles common to frameworks like
    PropBank and FrameNet, with descriptions and examples.
  latex:
    \begin{tabular}{lp{5.5cm}l}\toprule
    \textbf{Role} & \textbf{Description} & \textbf{Annotated Example} \\
    \midrule
    Agent & The entity that willfully instigates or performs the action. & \textit{[The chef]}$_{\text{AGENT}}$\textit{ cooked the meal.} \\
    Patient / Theme & The entity affected by the action or that undergoes a change of state. & \textit{The chef cooked [the meal]}$_{\text{PATIENT}}$\textit{.} \\
    Instrument & The means or tool used to perform the action. & \textit{He sliced bread [with a knife]}$_{\text{INSTRUMENT}}$\textit{.} \\
    Recipient & The entity that receives something as a result of the action. & \textit{She gave the book to [her friend]}$_{\text{RECIPIENT}}$\textit{.} \\
    Location & The spatial setting where the action occurs. & \textit{They met [in the park]}$_{\text{LOCATION}}$\textit{.} \\
    Source & The origin or starting point of a motion or transfer. & \textit{He walked [from the library]}$_{\text{SOURCE}}$\textit{.} \\
    Goal & The endpoint or destination of a motion or transfer. & \textit{He walked to [the station]}$_{\text{GOAL}}$\textit{.} \\
    \bottomrule
    \end{tabular}
