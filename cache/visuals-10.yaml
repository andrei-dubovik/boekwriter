- number: 3
  aid: Diagram
  description:
    A flowchart-style diagram illustrating the high-level architecture of a classic
    Information Retrieval system. It will show a 'User Query' as input to a central
    'IR System' box. This central box will be shown to use a 'Document Collection'
    and an 'Inverted Index'. The final output from the system will be a 'Ranked List
    of Documents'.
- number: 5
  aid: Table
  description:
    A two-part visual aid to demonstrate the construction of an inverted index. The
    first part will show a small collection of four sample documents with IDs. The
    second part will be a two-column table representing the final index. The first
    column will list unique terms ('token') from the documents, and the second
    column ('postings list') will show the list of document IDs in which that term
    appears.
- number: 9
  aid: Diagram
  description:
    A 2D vector space diagram to intuitively explain cosine similarity. The diagram
    will show a query vector ('q') and two document vectors ('d1' and 'd2')
    originating from the same point. The angle between 'q' and 'd1' will be visibly
    smaller than the angle between 'q' and 'd2', illustrating that 'd1' is
    considered more relevant to the query.
- number: 10
  aid: Diagram
  description:
    A classic Venn diagram to define precision and recall. One circle will represent
    the set of 'Relevant Documents' and an overlapping circle will represent the
    'Retrieved Documents'. The intersecting area will be labeled 'True Positives',
    visually grounding the concepts of precision (the fraction of retrieved
    documents that are relevant) and recall (the fraction of relevant documents that
    are retrieved).
- number: 15
  aid: Illustration
  description:
    A side-by-side illustration contrasting unstructured text with structured
    output. On the left, a paragraph of sample text about a corporate acquisition
    will be shown. On the right, a structured table with columns like 'Acquirer',
    'Target Company', and 'Acquisition Price' will be populated with data extracted
    from the text. Arrows will connect the specific phrases in the text to their
    corresponding cells in the table.
- number: 18
  aid: Diagram
  description:
    A diagram that frames Named Entity Recognition as a sequence labeling task. A
    sample sentence (e.g., 'Maria Rossi moved to Rome.') will be shown as a sequence
    of tokens at the bottom. Above each token, a corresponding label from the BIO
    (Beginning, Inside, Outside) tagging scheme will be displayed (e.g., B-PER,
    I-PER, O, O, B-LOC), clearly illustrating the input and desired output for a
    statistical model.
- number: 25
  aid: Table
  description:
    A summary table that concisely contrasts the core differences between
    Information Retrieval and Information Extraction. The table will have three
    columns: 'Aspect', 'Information Retrieval', and 'Information Extraction'. Rows
    will compare key aspects such as 'Goal' (Find relevant documents vs. Extract
    structured facts), 'Output' (Ranked list of documents vs. Filled database
    records), and 'Scope' (Document-level vs. Sub-document level).
