    A layered diagram that serves as both an architectural map and a
    session-sequencing guide. At the top, three stacked rounded rectangles represent
    the monorepo's packages: 'packages/shared-types', 'packages/api', and
    'packages/frontend'. Dependency arrows flow upward from shared-types into both
    api and frontend. Below the architecture, a horizontal swim-lane timeline shows
    three sessions arranged left to right. Session 1 is labeled 'Define the
    contract' and a highlighted connector links it to the shared-types package,
    showing that this session adds new TypeScript interfaces and shared validation
    schemas. A Git commit icon (a small node on a branch line running beneath the
    swim lanes) marks the checkpoint between Session 1 and Session 2. Session 2 is
    labeled 'Build the endpoint' and connects to both shared-types (read-only,
    dashed arrow) and api (read-write, solid arrow), showing it imports the new
    types and implements the API route, handler, and tests. Another Git commit node
    separates Session 2 from Session 3. Session 3 is labeled 'Wire up the UI' and
    connects to shared-types (read-only, dashed) and frontend (read-write, solid),
    showing it builds the React component, calls the new endpoint, and adds frontend
    tests. Between each pair of sessions a small annotation box shows the two-part
    handoff protocol: 'End-of-session summary written' on the left side of the
    commit node and 'Context re-established via summary' on the right side. This
    single diagram encodes the monorepo's dependency graph, the order and scope of
    each session, the Git checkpoint strategy, and the context-passing mechanism—all
    concepts discussed across multiple sections of the chapter—giving readers a
    concrete reference image they can return to while reading sections 4, 6, 7, and
    8\.
