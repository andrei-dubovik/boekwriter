    and Kleene star.
- number: 7
  aid: Table
  description:
    A table detailing advanced regular expression syntax. Columns will include
    'Syntax' (e.g., `[a-z]`), 'Description' (e.g., 'Character class for any
    lowercase letter'), and 'Example'. It will cover quantifiers (\*, +, ?),
    character classes, anchors, and capturing groups.
- number: 8
  aid: Table
  description:
    A two-column table demonstrating the information extraction case study. The left
    column will contain raw strings from a sample bibliography file. The right
    column will show the structured data (e.g., 'Author' and 'Title') extracted by
    applying a regular expression to the corresponding string on the left.
- number: 10
  aid: Diagram
  description:
    A state diagram of a simple Deterministic Finite Automaton (DFA). The diagram
    will show a machine recognizing strings ending in 'ing'. It will feature nodes
    for states (circles), a designated start state (incoming arrow), final states
    (double circles), and labeled directed edges for transitions.
- number: 12
  aid: Diagram
  description:
    A state diagram of a Non-deterministic Finite Automaton (NFA). This diagram will
    illustrate key features of non-determinism, such as a state having multiple
    transitions for the same input symbol and epsilon (ε) transitions, for a
    language like `a*b*`.
- number: 14
  aid: Diagram
  description:
    A multi-part diagram illustrating Thompson's construction algorithm. It will
    show the basic NFA building blocks for single symbols, and then demonstrate how
    they are recursively combined for concatenation, union, and Kleene star to build
    a complete NFA from a regular expression like `(a|b)*c`.
- number: 15
  aid: Table
  description:
    A trace table for the subset construction algorithm converting an NFA to a DFA.
    Rows will represent the new DFA states. Columns will show the DFA state name,
    the corresponding set of NFA states it represents, and the resulting transitions
    for each symbol in the alphabet.
- number: 17
  aid: Diagram
  description:
    A state diagram of a Finite-State Transducer (FST) for English noun
    pluralization. The transitions will be labeled with input:output pairs (e.g.,
    `x:es`). The diagram will trace the paths for inputs like 'cat' and 'fox' to
    produce the outputs 'cats' and 'foxes'.
