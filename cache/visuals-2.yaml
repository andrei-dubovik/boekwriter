- number: 7
  aid: Table
  description:
    A troubleshooting reference table with four columns: Symptom (the error message
    or observable behavior the reader sees), Likely Cause (a concise explanation of
    why it happens), Fix (the specific command or configuration change that resolves
    it), and OS (which operating systems are affected, using macOS/Linux/Windows WSL
    labels). Rows cover: (1) EACCES permission denied during global npm install,
    caused by npm's default global directory being owned by root, fixed by switching
    to nvm; (2) engine compatibility error stating Node.js version is too old,
    caused by system-shipped Node.js being below the minimum required version, fixed
    by installing a current LTS release via nvm; (3) 'claude: command not found'
    after a successful install, caused by the npm global bin directory not being on
    the user's PATH, fixed by adding the correct directory to the shell profile
    file; (4) ETIMEDOUT or ECONNREFUSED during install, caused by a corporate proxy
    or firewall blocking npm registry access, fixed by configuring npm's proxy and
    https-proxy settings or pointing to an internal registry mirror; (5) SSL
    certificate errors such as UNABLE_TO_GET_ISSUER_CERT_LOCALLY, caused by
    corporate TLS inspection replacing certificates, fixed by setting the
    NODE_EXTRA_CA_CERTS environment variable to the corporate CA bundle; (6)
    'unexpected token' syntax errors on launch, caused by running Claude Code under
    an unsupported older Node.js version that lacks required JavaScript features,
    fixed by upgrading Node.js to the minimum supported version. This table gives
    the reader a single, scannable page they can consult whenever an installation
    attempt fails, without having to read through paragraphs of prose to find the
    relevant fix.
