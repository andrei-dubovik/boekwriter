prompt:
  You are writing a chapter titled "Installation and Setup" in a book called "A
  Tinkerer's Introduction to Claude Code". The plan for the chapter is a follows.
  
  01. We open the chapter by establishing the prerequisites a reader needs before
      installing Claude Code, covering the required versions of Node.js and npm,
      basic terminal literacy, and how to check whether these tools are already
      present on your system.
  02. We walk through installing or updating Node.js and npm on macOS, Linux, and
      Windows via WSL, explaining the recommended approaches such as using a
      version manager like nvm so that readers avoid system-level permission
      headaches later.
  03. We explain how to install Claude Code itself as a global npm package,
      including the exact command to run, what output to expect during a
      successful installation, and how to confirm the installed version.
  04. Example: we provide a complete end-to-end walkthrough of installing Claude
      Code on a fresh macOS machine starting from zero, showing every terminal
      command and its expected output so the reader can compare their own
      experience step by step.
  05. We cover authentication by explaining how to obtain and configure an
      Anthropic API key, how to connect through a Max plan or team subscription as
      an alternative, and how Claude Code stores and retrieves credentials on your
      machine.
  06. We guide the reader through verifying their installation by launching Claude
      Code in a small directory and issuing a simple test prompt, confirming that
      the tool starts, authenticates, and responds correctly.
  07. We address the most common installation problems readers are likely to
      encounter, including npm permission errors, Node.js version
      incompatibilities, PATH misconfigurations, and proxy or firewall issues in
      corporate or restricted network environments, with specific fixes for each.
  08. Example: we present a realistic scenario where a Linux user encounters a
      permission denied error during global npm install and walks through
      diagnosing it, understanding why it happens, and resolving it using the
      recommended nvm-based approach rather than resorting to sudo.
  09. We discuss choosing and configuring a terminal emulator for the best Claude
      Code experience, noting which terminals handle Claude Code's rich output
      well, font and color considerations, and brief tips for popular options like
      iTerm2, Windows Terminal, and Ghostty.
  10. We close the chapter by discussing API usage and cost awareness, explaining
      how Claude Code consumes tokens with each interaction, where to monitor your
      usage, how to set spending limits, and how to develop an intuition for what
      different tasks cost so that experimentation remains joyful rather than
      anxiety-inducing.
  
  For each item of the plan you may choose one of the following visual aids:
  
  - Table
  - Diagram
  - Chart
  - Map
  - Timeline
  - Photograph
  - Illustration
  
  Only choose an aid if it can contribute substantially to the unerstanding of the
