- number: 3
  aid: Diagram
  description:
    A 'before and after' style diagram. The 'before' side shows the full chain rule
    dependencies for a word, with arrows pointing from all previous words in the
    sequence. The 'after' side shows the simplified Markov assumption for a trigram
    model, with arrows pointing only from the previous two words, visually
    demonstrating the reduction in complexity.
- number: 4
  aid: Table
  description:
    A three-column table that breaks down a sample sentence like 'The cat sat on the
    mat.' The first column lists all unigrams, the second lists all bigrams (e.g.,
    '<s> The', 'The cat', ...), and the third lists all trigrams (e.g., '<s> <s>
    The', '<s> The cat', ...), making the N-gram concept concrete.
- number: 6
  aid: Table
  description:
    A two-part table for a step-by-step calculation. The first part is a matrix of
    bigram counts derived from a small sample corpus. The second part is a
    corresponding matrix showing the final Maximum Likelihood Estimation (MLE)
    probabilities, calculated by dividing each bigram count by its corresponding
    unigram prefix count.
- number: 7
  aid: Table
  description:
    A bigram count matrix built from the sample corpus. The table would be
    intentionally sparse, with most cells containing a '0' to visually emphasize how
    many plausible word combinations were not seen in the training data,
    illustrating the core challenge of data sparsity and the zero-probability
    problem.
- number: 8
  aid: Diagram
  description:
    A conceptual diagram showing two bars representing the total probability mass.
    The 'MLE' bar is divided only among seen events. The 'Smoothed' bar shows that a
    small portion of the probability from each 'seen' section has been shaved off
    and reallocated to a new section labeled 'unseen events', intuitively explaining
    the redistribution process.
- number: 9
  aid: Table
  description:
    A comparison table building on the example from section 6. Columns would show:
    the bigram, its original MLE count, its Laplace 'add-one' adjusted count, its
    original MLE probability (with zeros), and its final Laplace-smoothed
    probability (all non-zero). This provides a direct contrast of the results
    before and after smoothing.
- number: 10
  aid: Chart
  description:
    A bar chart titled 'Frequency of Frequencies'. The x-axis represents a frequency
    'r' (n-grams that appeared 1 time, 2 times, etc.), and the y-axis represents the
    number of n-gram types (Nr) that had that frequency. This visualizes the
    long-tail distribution that Good-Turing smoothing leverages to estimate the
    probability of unseen events.
- number: 12
  aid: Illustration
  description:
    A clean illustration of a smartphone's virtual keyboard. A partial sentence is
    typed in the text field (e.g., 'I am heading to the...'), and the predictive
    text bar above the keyboard shows three probable next words (e.g., 'park',
    'store', 'gym') that an N-gram model would suggest.
