    A three-column comparison table where each column represents one version of the
    signup-form validation prompt (Vague, Moderate, Richly Specific). The rows break
    down key dimensions: the exact prompt text given to Claude Code, the specificity
    of the desired validation rules (e.g., none stated vs. 'email and password' vs.
    'email regex, password minimum 12 chars with one symbol, username 3–20
    alphanumeric'), whether error-handling behavior is mentioned, whether target
    files or frameworks are named, whether UX requirements like inline error
    messages are specified, a brief summary of what Claude Code actually produces in
    response, and a qualitative assessment of how much follow-up correction the user
    needed. This table makes the cause-and-effect relationship between prompt detail
    and output quality immediately scannable, letting the reader see at a glance
    exactly which missing details in the vague prompt led to unwanted guesses, which
    additions in the moderate prompt narrowed the output, and how the richly
    specific prompt eliminated almost all ambiguity. It serves as the chapter's
    single most referenceable artifact—a concrete, side-by-side proof of the three
    core principles (specificity, context, constraints) introduced in the preceding
    section.
