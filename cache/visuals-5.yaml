  aid: Diagram
  description:
    A vertical flowchart diagram tracing the path of a user login request through
    the application's layers, with two parallel tracks. The left track shows the
    application components in order from top to bottom: HTTP POST /login request
    arrives, Express route handler (routes/auth.js), authentication middleware
    (middleware/auth.js), user service layer (services/userService.js), database
    model and query (models/User.js), and then the return path back up carrying a
    session token in the HTTP response. The right track, connected to each
    corresponding layer by horizontal dashed arrows, shows the specific file that
    Claude Code reads at each stage and a brief annotation of what it discovers
    there (e.g., 'reads routes/auth.js — finds router.post("/login") calling
    authController.login'). Arrows between layers on the left track are labeled with
    what data is passed between them (e.g., 'email + password', 'user object', 'JWT
    token'). This diagram provides high information density by simultaneously
    illustrating the architectural layering of the application, the concrete data
    flowing between layers, and the investigative process Claude Code follows to
    uncover each link in the chain—three perspectives that would require extensive
    prose to convey in text alone.
