- number: 2
  aid: Diagram
  description:
    A side-by-side comparison diagram showing the same sentence, e.g., 'The old dog
    chased the cat', analyzed using both constituency and dependency parsing. The
    left side will show the hierarchical phrase structure tree (constituency), and
    the right side will show the dependency graph with directed, labeled arcs
    between words.
- number: 4
  aid: Table
  description:
    A table clearly defining the components of a simple Context-Free Grammar. The
    table will have three sections: one listing the Non-Terminal symbols (e.g., S,
    NP, VP), one for Terminal symbols (e.g., 'the', 'cat', 'sat'), and a main
    section listing the Production Rules (e.g., S -> NP VP, NP -> Det N).
- number: 5
  aid: Diagram
  description:
    A classic phrase structure tree diagram for the sentence 'The cat sat on the
    mat'. The diagram will show the sentence at the bottom (terminals) and trace the
    hierarchical structure upwards through non-terminal nodes like NP, VP, and PP,
    culminating in the root S node, visually demonstrating the application of the
    CFG rules.
- number: 6
  aid: Diagram
  description:
    A diagram presenting two different, yet valid, phrase structure trees for the
    ambiguous sentence 'I saw a man with a telescope'. One tree will show the
    prepositional phrase 'with a telescope' modifying the noun 'man' (the man has
    the telescope), and the other will show it modifying the verb 'saw' (I used the
    telescope to see).
- number: 8
  aid: Chart
  description:
    A completed CYK parsing chart, presented as a triangular grid. The axes will
    represent the word positions in the sentence. Each cell (i, j) in the chart will
    be filled with the non-terminal symbols that can generate the substring of the
    sentence from word i to word j, illustrating the dynamic programming process of
    building up the parse from smaller to larger constituents.
- number: 10
  aid: Diagram
  description:
    A dependency graph for a sample sentence like 'She ate a green apple'. The
    diagram will show the words of the sentence with directed arrows (arcs) between
    them. Each arc will be labeled with its grammatical relation type (e.g., an arc
    from 'ate' to 'She' labeled 'nsubj', an arc from 'ate' to 'apple' labeled
    'dobj', and an arc from 'apple' to 'green' labeled 'amod').
- number: 12
  aid: Table
  description:
    A step-by-step trace of a transition-based parser's operation. The table will
    have columns for 'Step', 'Stack', 'Buffer', 'Action Taken', and 'Generated
    Arcs'. Each row will show the configuration of the parser at a single step as it
    processes a sentence, making the sequence of SHIFT, LEFT-ARC, and RIGHT-ARC
    decisions clear.
