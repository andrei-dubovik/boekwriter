- number: 2
  aid: Diagram
  description:
    A two-panel diagram contrasting lexical and compositional semantics. The left
    panel, labeled 'Lexical Semantics,' will show individual words ('dog,' 'barks')
    pointing to their conceptual meanings. The right panel, 'Compositional
    Semantics,' will show how these individual meanings combine within a sentence
    structure ('The dog barks') to produce a complete sentence meaning.
- number: 4
  aid: Diagram
  description:
    A network diagram illustrating the structure of WordNet. The diagram will show
    several synonym sets (synsets) like {car, auto, automobile}, {truck}, and {motor
    vehicle} as nodes. Labeled, directed edges will connect these nodes to represent
    semantic relations, with arrows clearly indicating hypernymy ('car' is-a 'motor
    vehicle') and meronymy ('car' has-part 'wheel').
- number: 5
  aid: Diagram
  description:
    A hierarchical graph diagram demonstrating the traversal of WordNet's hypernym
    hierarchy. Starting with the synset for 'car' at the bottom, arrows will point
    upwards through a chain of increasingly general concepts: 'motor vehicle',
    'wheeled vehicle', 'vehicle', 'conveyance', 'instrumentality', and finally
    'entity'.
- number: 6
  aid: Illustration
  description:
    An illustration visually representing the distributional hypothesis. It will
    show a central target word, 'bass,' surrounded by two different contextual
    clouds of words. One cloud will contain words like 'fishing,' 'river,' 'lure,'
    indicating the fish meaning, while the other will contain words like 'music,'
    'guitar,' 'treble,' indicating the instrument meaning.
- number: 7
  aid: Diagram
  description:
    A diagram of a simplified 2D vector space model. It will plot several
    semantically related words as vectors (arrows from the origin) or points. Words
    like 'king', 'queen', 'man', and 'woman' will be positioned such that the
    spatial relationships between them are meaningful (e.g., the vector from 'man'
    to 'woman' is similar to the one from 'king' to 'queen').
- number: 9
  aid: Diagram
  description:
    A side-by-side comparison of the Word2Vec architectures. The left side will
    depict the Continuous Bag-of-Words (CBOW) model, showing multiple context word
    vectors as input to a neural network that predicts a single target word vector.
    The right side will show the Skip-gram model, with a single target word vector
    as input predicting multiple context word vectors.
- number: 11
  aid: Illustration
  description:
    A visual representation of word vector arithmetic in a 2D space. It will show
    the vectors for 'king,' 'man,' and 'woman.' The illustration will graphically
    perform the operation by taking the 'king' vector, subtracting the 'man' vector
    (i.e., adding its inverse), and then adding the 'woman' vector. The resulting
    final vector will be shown to point directly to the location of the 'queen'
    vector.
- number: 13
  aid: Diagram
  description:
    A diagram illustrating simple compositional semantics using a sentence parse
    tree for 'The cat sat'. At the leaves of the tree are the vectors for 'The',
    'cat', and 'sat'. The diagram will show how the vectors for 'The' and 'cat' are
    combined (e.g., via element-wise averaging) to create a vector for the noun
    phrase 'The cat', which is then combined with the verb's vector to create a
    final sentence vector at the root.
- number: 15
  aid: Table
  description:
    A three-column table defining key semantic roles from PropBank and FrameNet. The
    columns will be 'Role' (e.g., Agent, Patient, Instrument), 'Description' (e.g.,
    'The entity performing the action'), and 'Annotated Example' (e.g., '\[The
    chef\]AGENT cooked \[the meal\]PATIENT \[with a new pan\]INSTRUMENT.').
