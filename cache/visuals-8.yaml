    A flowchart diagram depicting the safe incremental refactoring loop. The diagram
    begins with a node labeled 'Identify next small refactoring step' which flows
    into 'Prompt Claude Code with scoped request'. From there an arrow leads to
    'Review the diff carefully', which branches at a diamond decision node labeled
    'Behavior preserved?'. A 'No' edge loops back to 'Revise the prompt or revert
    changes'. A 'Yes' edge proceeds to 'Run the full test suite', which reaches a
    second diamond decision node labeled 'All tests pass?'. A 'No' edge from this
    diamond leads to 'Revert to last commit and adjust approach', which loops back
    to the initial prompting node. A 'Yes' edge flows to 'Commit with descriptive
    message', which then reaches a final diamond labeled 'More refactoring needed?'.
    A 'Yes' edge loops all the way back to the first node, completing the cycle,
    while a 'No' edge exits to a terminal node labeled 'Refactoring complete'. The
    diagram makes the cyclic, disciplined nature of the workflow immediately visible
    in a way that sequential prose cannot, highlights the two critical checkpoints
    (diff review and test suite) where regressions are caught, and clearly shows
    that every revert path circles back to a safe committed state rather than
    leaving the codebase in a partially transformed condition.
