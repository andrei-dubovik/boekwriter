prompt:
  You are writing a chapter titled "Refactoring and Improving Code Quality" in a
  book called "A Tinkerer's Introduction to Claude Code". The plan for the chapter
  is a follows.
  
  1. Open the chapter by establishing the core premise that refactoring—the
     disciplined restructuring of existing code without changing its external
     behavior—is one of the tasks where Claude Code delivers the most dramatic
     productivity gains, because it can hold large swaths of code in context
     simultaneously and apply tedious, repetitive transformations with a
     consistency that human developers struggle to match over long editing
     sessions.
  2. Cover the most accessible refactoring operation, renaming variables,
     functions, and modules for clarity, showing how to prompt Claude Code to
     perform project-wide renames that respect scope and update all references,
     and explaining why clear naming is the single highest-leverage improvement a
     tinkerer can make to inherited or hastily written code.
  3. Present a worked example in which the reader asks Claude Code to identify
     duplicated input-validation logic scattered across three HTTP handler
     functions in a small Express application and extract it into a single shared
     validation utility, showing the exact prompts used, the extracted function
     Claude Code produces, the updated call sites, and a brief discussion of how
     to review the diff to confirm behavior is preserved.
  4. Discuss restructuring modules and files to improve separation of concerns,
     including techniques for prompting Claude Code to move functions between
     files, split a bloated module into focused smaller ones, update all import
     statements accordingly, and adjust any build configuration that references
     moved paths, emphasizing the importance of telling Claude Code about the
     desired target structure rather than dictating every individual file move.
  5. Present a case study that walks step by step through converting a
     callback-heavy Node.js middleware stack into clean async/await code,
     beginning with the prompt that asks Claude Code to survey the current
     callback patterns, continuing through its proposed conversion plan, showing
     two rounds of iterative refinement where the reader asks for adjustments to
     error-handling strategy, and concluding with the final transformed code and a
     passing test suite that confirms no regressions were introduced.
  6. Explore using Claude Code to modernize codebases by adopting current language
     features—such as destructuring assignments, optional chaining, nullish
     coalescing, template literals in JavaScript, or walrus operators and
     f-strings in Python—and discuss how to prompt it to apply these updates
     conservatively so that the resulting code still runs on the project's minimum
     supported runtime version.
  7. Address the value of improving type annotations, showing how to ask Claude
     Code to add TypeScript type definitions to untyped JavaScript code or to
     enrich Python type hints across a module, and explain how better types serve
     as living documentation that catches bugs at compile time and improves
     autocomplete in the reader's editor.
  8. Move beyond structural refactoring to cover code-quality improvements that
     Claude Code handles well, including adding robust error handling to functions
     that currently swallow exceptions, improving log messages so they carry
     enough context to be useful in production debugging, writing or updating
     JSDoc and docstring comments for public APIs, and normalizing inconsistent
     code style across files contributed by different authors.
  9. Close the chapter with a thorough discussion of refactoring safely,
     explaining the discipline of asking Claude Code to make small incremental
     changes rather than wholesale rewrites, running the project's test suite
     between each step to catch regressions early, committing after each verified
     step so you can revert cleanly, and recognizing the warning signs that Claude
     Code has accidentally changed behavior so you can course-correct before the
     damage compounds.
  
  For each item of the plan you may choose one of the following visual aids:
  
  - Table
  - Diagram
  - Chart
  - Map
  - Timeline
  - Photograph
  - Illustration
  
  Only choose an aid if it can contribute substantially to the unerstanding of the
  text. Avoid visual aids with low information density. You have a budget of at
  most 1 aids. Explain the chosen aids in detail. If the chosen aid is a table,
  the table must fit on a portrait A4 page. Only list the items where an aid has
  been chosen.
