- number: 4
  aid: Diagram
  description:
    A tree diagram illustrating the Rhetorical Structure Theory (RST) analysis of a
    short, multi-sentence paragraph. The diagram will show terminal nodes (leaves)
    as elementary discourse units (clauses) and non-terminal nodes representing the
    rhetorical relations (e.g., Elaboration, Contrast, Cause) that connect them.
    Each relation will connect a 'nucleus' (the more central part of the text) and a
    'satellite' (the part that modifies the nucleus), clearly labeling which is
    which.
- number: 7
  aid: Table
  description:
    A three-column table defining key coreference terminology. The columns will be
    titled 'Term,' 'Definition,' and 'Example.' Rows will cover concepts such as
    'Referring Expression,' 'Anaphora,' 'Cataphora,' 'Antecedent,' 'Pronominal
    Anaphora,' and 'Nominal Anaphora.' The example column will contain a sentence
    with the relevant parts bolded or italicized to clearly illustrate the concept.
- number: 8
  aid: Illustration
  description:
    A visual representation of coreference chains within a short narrative
    paragraph. The paragraph will contain multiple entities. Each entity's mentions
    (e.g., 'Dr. Aris,' 'the scientist,' 'she,' 'her') will be highlighted in a
    unique, consistent color. Subscripts could also be used (e.g., 'she_1', 'the
    scientist_1') to explicitly link all expressions belonging to the same chain,
    making the connections unambiguous.
- number: 10
  aid: Diagram
  description:
    A simplified architectural diagram of a modern end-to-end neural coreference
    resolution model. The diagram will show the flow of information from input text
    to final coreference clusters. Key components to be illustrated include: 1) Word
    and character embeddings, 2) A BiLSTM to create contextual representations, 3) A
    mention detection module that scores all possible text spans, and 4) An
    antecedent scoring module that links each detected mention to its most likely
    antecedent.
- number: 12
  aid: Diagram
  description:
    A block diagram illustrating the pipeline architecture of a traditional
    task-oriented dialogue system. It will feature four main labeled boxes: Natural
    Language Understanding (NLU), Dialogue State Tracker (DST), Dialogue Policy, and
    Natural Language Generation (NLG). Arrows will indicate the flow of information:
    user utterance enters NLU, which outputs a semantic frame to the DST, which
    updates the dialogue state for the Policy, which selects a system action for the
    NLG to convert into a textual response for the user.
- number: 13
  aid: Table
  description:
    A multi-column table that traces a sample flight-booking dialogue over several
    turns. The columns will correspond to the dialogue system components: 'Speaker'
    (User/System), 'Utterance,' 'NLU (Intent & Slots),' 'Dialogue State (Updated
    Slots),' 'Policy (System Action),' and 'NLG (System Response).' Each row will
    represent a single turn, demonstrating step-by-step how the system processes
    user input, updates its belief state, decides on an action, and generates a
    response.
- number: 14
  aid: Diagram
  description:
    A conceptual diagram summarizing the relationships between the chapter's three
    core topics. Three main nodes will be labeled 'Discourse Analysis,' 'Coreference
    Resolution,' and 'Dialogue Systems.' An arrow from Discourse Analysis will point
    to Coreference Resolution, labeled 'is a key sub-task of.' Arrows from both
    Discourse Analysis and Coreference Resolution will point to Dialogue Systems,
    labeled with phrases like 'provides structure' and 'enables tracking,' to
    illustrate how the first two concepts are foundational for building coherent and
    context-aware conversational agents.
