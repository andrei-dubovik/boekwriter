response:
- number: 1
  aid: Timeline
  description:
    A timeline charting the history of machine translation. It will begin with
    Warren Weaver's 1949 memorandum, mark the Georgetown-IBM experiment in 1954, the
    influential ALPAC report in 1966, the rise of statistical methods in the late
    1980s/early 1990s, the advent of phrase-based SMT in the early 2000s, and the
    paradigm shift to Neural MT starting around 2014 with sequence-to-sequence
    models and the Transformer in 2017.
- number: 3
  aid: Illustration
  description:
    An illustration demonstrating lexical ambiguity. It will show a simple English
    sentence like 'The bat flew over the field.' and present two distinct visual
    interpretations and corresponding target-language translations: one for a flying
    mammal and another for a piece of sporting equipment. This will make the
    challenge of disambiguation concrete for the reader.
- number: 6
  aid: Diagram
  description:
    A conceptual diagram of the noisy channel model for Statistical Machine
    Translation. The diagram will show an intended target sentence 'y' entering a
    'noisy channel' (the translation process), which outputs the observed source
    sentence 'x'. The decoder's task is shown as recovering the most probable 'y'
    given 'x' by combining a translation model P(x|y) and a language model P(y),
    visually representing Bayes' theorem.
- number: 7
  aid: Illustration
  description:
    A visual representation of word alignment in a parallel sentence pair. The
    illustration will display an English sentence at the top and its French
    translation at the bottom. Lines will be drawn connecting words that are
    translations of each other, showcasing one-to-one, one-to-many, and many-to-one
    alignments to highlight the complexity of the correspondence.
- number: 13
  aid: Diagram
  description:
    A high-level architectural diagram of a sequence-to-sequence (seq2seq) model. It
    will depict two main components: an Encoder RNN that processes the input
    sentence step-by-step and compresses it into a fixed-size context vector, and a
    Decoder RNN which uses this vector to generate the output sentence token by
    token. The flow of information from source to context vector to target will be
    clearly marked.
- number: 15
  aid: Diagram
  description:
    A diagram illustrating the attention mechanism. It will show the decoder at a
    specific timestep, generating one target word. Instead of using a single context
    vector, arrows will originate from the current decoder state and point to all of
    the encoder's hidden states. This visualizes the calculation of attention
    scores, which create a context-specific vector that allows the model to 'focus'
    on the most relevant input words for the current output word.
- number: 16
  aid: Chart
  description:
    A heatmap chart visualizing an attention matrix. The x-axis will list the words
    of a source sentence and the y-axis will list the words of the generated target
    sentence. Each cell in the grid will be colored based on the attention weight,
    with brighter colors indicating a higher weight. The chart will clearly show how
    the model aligns source and target words during translation, often forming a
    strong diagonal pattern.
- number: 18
  aid: Table
  description:
    A comparative table showcasing the qualitative difference between SMT and NMT
    outputs. The table will have three columns: 'Source Sentence', 'SMT Output', and
    'NMT Output'. It will feature a sentence with complex syntax or idiomatic
    phrasing, where the SMT output appears literal and disfluent, while the NMT
    output demonstrates superior fluency and accuracy.
