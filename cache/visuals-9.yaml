    A two-row horizontal timeline titled 'Before and After: Cleaning Up History with
    Interactive Rebase'. The top row, labeled 'Before', shows a single branch with
    seven commits in chronological order, each represented as a labeled node. The
    commit labels reveal the haphazard mix described in the text: 'Add user avatar
    upload', 'Fix typo in README', 'Reformat settings.py with Black', 'Half-done
    avatar cropping', 'Fix crash on empty email field', 'More reformatting', 'Finish
    avatar cropping'. Each node is color-coded by category—blue for feature work,
    red for bug fixes, gray for formatting—making the chaotic interleaving
    immediately visible. The bottom row, labeled 'After', shows the same branch
    reorganized into three clean groups separated by subtle vertical dividers: a
    gray cluster of two commits ('Reformat settings.py with Black', 'Reformat
    remaining files with Black'), a red single commit ('Fix crash on empty email
    field'), and a blue cluster of two commits ('Add user avatar upload with
    cropping', 'Update README for avatar feature'). Dashed arrows connect each
    'After' commit back to the one or more 'Before' commits it was squashed or
    reworded from, making the mapping between old and new history explicit. A small
    legend in the corner maps the three colors to 'Feature', 'Bug fix', and
    'Formatting'. This timeline makes the abstract concept of interactive rebase
    concrete by letting the reader see at a glance how a tangled sequence of commits
    is untangled into coherent, reviewable units, reinforcing the narrative of the
    case study far more efficiently than prose alone.
