{query: str, model: str, prompt: str, schema: str}
---
query: chapters
prompt:
  Draft a list of chapters for a book called "${book}". Next to the title of
  each chapter write one paragraph introducing what that chapter is about. You
  have a total budget of ${word_count} words. Allocate this budget per chapter.
schema: [{number: int, title: str, description: str, word_count: int}]
---
query: chapter-outline
prompt:
  You are writing a book called "${book}". The book consists of the following
  chapters.
  % for i, chapter in enumerate(chapters):

  # Chapter ${i + 1}: ${chapter['title']}.

  ${chapter['description']}
  % endfor

  Consider Chapter ${cid + 1} "${chapters[cid]['title']}". Write a detailed
  plan for this chapter. Each item in the plan must be one sentence long. For
  this chapter you have a total budget of ${word_count} words. Allocate this
  budget per item of the plan.

  An item of a plan can be, among other things, a pedagogical aid such as:

  - an example
  - a case study
schema: [{item: str, word_count: int}]
---
query: visuals
prompt:
  You are writing a chapter titled "${chapter['title']}" in a book called
  "${book}". The plan for the chapter is a follows.

  % for i, point in enumerate(outline):
  ${i + 1}. ${point['item']}
  % endfor

  For each item of the plan you may choose one of the following visual aids:

  - Table
  % for name in visuals:
  - ${name}
  % endfor

  Only choose an aid if it can contribute substantially to the unerstanding of
  the text. Avoid visual aids with low information density. You have a budget
  of at most ${chapter['word_count']//1000} aids. Explain the chosen aids in
  detail. If the chosen aid is a table, the table must fit on a portrait A4
  page. Only list the items where an aid has been chosen.
schema: [{number: int, aid: str, description: str}]
---
query: chunk
prompt:
  You are writing a book called "${book}". The book consists of the following
  chapters.
  % for i, chapter in enumerate(chapters):

  # Chapter ${i + 1}: ${chapter['title']}.

  ${chapter['description']}
  % endfor

  Consider Chapter ${cid + 1} "${chapters[cid]['title']}". A plan has been
  prepared for this chapter.

  % for i, point in enumerate(outline):
  ${i + 1}. ${point['item']}
  % endfor

  Consider point ${oid + 1} of the plan. Write this part of the book. Be consise
  in your writing, avoid an overly verbose prose. Use Markdown for paragraphs,
  emphasis, numbered or unnumbered lists. Use LaTeX for formulas. Do not add any
  headers. Footnotes are allowed but should be used sparingly. In total, you
  should write between ${min_words} and ${max_words} words.
  % if visual is not None:

  This section of the book will feature a ${visual['aid']}. Its description is as
  follows.

  ${visual['description']}

  This visual aid will be drafted separately, but you can already refer to it as
  Fig. ${visual['fig']} in the text.
  % endif
---
query: figure
prompt:
  Consider the following text fragment from a book called "${book}".

  ${chunk}

  This fragment refers to Fig. ${visual['fig']}. The figure in question is a
  "${visual['aid']}" and its description is as follows:

  ${visual['description']}

  Draw the figure using SVG. The figure should have a white background, and it
  should have an aspect ratio of 4:3. Do not include the figure title in the
  SVG figure. Verify that the labels do not obstruct one another.
schema: {caption: str, svg: str}
---
query: table
prompt:
  Consider the following text fragment from a book called "${book}".

  ${chunk}

  This fragment refers to Fig. ${visual['fig']}, which is a table. Its
  description is as follows:

  ${visual['description']}

  Draft this table, format it using LaTeX. Assume the `booktabs` package is
  already imported. Only include the `tabular` environment and its content in
  the output, exclude the outer `table` environment.
schema: {caption: str, latex: str}
---
query: headpiece
prompt:
  What follows is a text for a chapter from a book called "${book}".

  <chapter>
  % for chunk in content:

  ${chunk['chunk']}
  % endfor

  </chapter>

  Choose an illustration that would be a good headpiece for this chapter. The
  illustration should show a human activity that is closely related to one of
  the topics discussed in the chapter. Describe the chosen illustration as if
  your are giving a task to an artist. Keep the aesthetics simple. The
  description should be self-sufficient, i.e. it should not reference the
  chapter. The description should be no longer than a paragraph.
---
query: image
model: gemini-2.5-flash-image
prompt: ${prompt}
schema: png
...
